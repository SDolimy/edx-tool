const SUPA_URL="https://alrquztxxsugeeoheoyx.supabase.co";
const SUPA_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFscnF1enR4eHN1Z2Vlb2hlb3l4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1NTk2NzMsImV4cCI6MjA5ODEzNTY3M30.VZu_xO3SvX4HCOUCmvZmnrjyeNKtPpqzUT863x7mAWY";
const SUPA_HEADERS={"Content-Type":"application/json","apikey":SUPA_KEY,"Authorization":`Bearer ${SUPA_KEY}`};

const supaStore={
  async get(key){
    try{
      const r=await fetch(`${SUPA_URL}/rest/v1/storage?key=eq.${encodeURIComponent(key)}&select=value`,{headers:SUPA_HEADERS});
      if(!r.ok)throw new Error('fetch failed');
      const d=await r.json();
      if(d&&d.length>0){localStorage.setItem(key,d[0].value);return{value:d[0].value};}
      const v=localStorage.getItem(key);
      return v?{value:v}:null;
    }catch{
      const v=localStorage.getItem(key);
      return v?{value:v}:null;
    }
  },
  async set(key,value){
    try{
      // حذف الصف القديم أولاً ثم إدراج جديد
      await fetch(`${SUPA_URL}/rest/v1/storage?key=eq.${encodeURIComponent(key)}`,{
        method:"DELETE",
        headers:SUPA_HEADERS
      });
      const r=await fetch(`${SUPA_URL}/rest/v1/storage`,{
        method:"POST",
        headers:{...SUPA_HEADERS,"Prefer":"return=minimal"},
        body:JSON.stringify({key,value})
      });
      if(!r.ok)throw new Error('insert failed');
      localStorage.setItem(key,value);
      return true;
    }catch{
      try{localStorage.setItem(key,value);return true;}catch{return null;}
    }
  }
};
window.storage=supaStore;

const DEFAULT_GUIDELINE=`دليل ترجمة منصة أوبن إدكس - النسخة الكاملة المعتمدة
(كتبه المهندس عمر العيثاوي والدكتور سليمان مثنى - آب 2025)

هذا الدليل موجّه لمترجمي برمجية أوبن إدكس إلى اللغة العربية عبر منصة Transifex، وهو معتمد للنشر لكافة مشاريع الترجمة. التزم بكل قاعدة فيه بدقة، وبكل الأمثلة المذكورة، سواء كانت أمثلة توضيحية ضمن شرح القواعد أو الأمثلة الواردة في الجدول المرجعي النهائي (Representative Sample for En-Ar Translation). كل هذه الأمثلة معتمدة بالكامل ولها وزن استرشادي قوي في الترجمة.

============================================
1) تعليمات عامة
============================================
- اكتب بالفصحى واجعل الكلام قريبًا من العامية المحكية، ومفهومًا. مثال:
  - اكتب "تعالَ" بدلاً من "ائتِ"
  - اكتب "أخرس" بدلاً من "أصمّ"
- اجعل كلامك جزلاً فصيحًا بعيدًا عن الترجمة الحرفية للكلام الإنجليزي. مثال:
  - "The file has been downloaded" => "حُمِّل الملف" وليس "لقد تم تحميل الملف"

============================================
2) صيغ الأزرار والأوامر
============================================
خيارات القائمة مثل "Quit", "Save", "Edit" وما شابه يجب أن تُترجم إلى العربية بصيغة الأمر، لغرض التطبيع واتباع ما هو موجود، ولكي نعبّر عن تفاعل حيّ أكثر بين المستخدم والجهاز. لهذا أهمية قصوى.
أمثلة:
  - Cancel => ألغِ
  - Discard => تجاهَل
  - Delete => احذِف

(يُستأنس بدليل عربآيز للترجمة للتوجيهات العامة والاقتراحات)

============================================
3) المتغيرات بصيغها المختلفة
============================================
يحتوي النص الإنجليزي على متغيرات بصيغ مختلفة، فلا تترجمها بل دعها كما هي:
- متغيرات تبدأ وتنتهي بأقواس معقوفة: تُترك كما هي ولا تُترجم.
  مثال: "Welcome to {siteName}, {fullName}!" => "مرحبًا بك في {siteName} يا {fullName}!"
- متغيرات تبدأ بـ % متبوعة بأقواس دائرية (ملوّنة بالبرتقالي الفاتح، تُنسخ عند النقر عليها في حقل الترجمة): تُترك كما هي ولا تُترجم.
  مثال: "More information about 1%(name)s" => "المزيد من المعلومات عن 1%(name)s"
- شرطات فاصلة بين الكلمات (مثل alert-confirmation-description): تُترك كما هي ولا تُترجم.
- متغيرات على هيئة كود مثل <%- signatoryName %>: تُترك كما هي.
  مثال: 'Delete "<%- signatoryName %>" from the list of signatories?' => 'هل تريد حذف "<%- signatoryName %>" من لائحة الموقّعين؟'

============================================
4) العلامات البرمجية ولغة HTML
============================================
بعض التطبيقات تستخدم مزايا النصوص الغنية عبر أوامر HTML مثل <p>. من المهم جدًا أن يحافظ النص المترجم على كل هذه الأوامر، وكذلك أحرف طباعة لغة C مثل \\n أو \\t أو %s. ترجم النص الذي بين الأوامر فقط.
مثال:
  - "<p><b>Details of the Request</b></p>" => "<p><b>تفاصيل الطلب</b></p>"

============================================
5) العلامات التجارية
============================================
تُترجم العلامات التجارية بنسق واحد وحسب تفضيل المؤسسة:
  - Open edX => أوبن إدكس
  - edX => إدكس
  - Chrome => كروم
  - Studio => ستوديو
  - LinkedIn => لينكد إن
  - Twitter / Facebook => تُعرّب بنفس الأسلوب

============================================
6) صيغ المفرد والجمع (Plural Forms)
============================================
الصيغة المعتمدة هي صيغة مؤسسة عربآيز ذات الست حالات:
"Plural-Forms: nplurals=6; plural=n==0 ? 0 : n==1 ? 1 : n==2 ? 2 : n%100>=3 && n%100<=10 ? 3 : n%100>=11 && n%100<=99 ? 4 : 5;"

ملخص صيغ المفرد والجمع:
  - صفر: لا + المعدود جمعًا منصوبًا => مثال: لا حروف، لا متعلمين
  - واحد: المعدود بصيغة المفرد + واحد => مثال: حرفًا واحدًا، نتيجة واحدة
  - اثنان: المعدود بصيغة المثنى => مثال: حرفين، أو حرفين اثنين
  - 3-10 (few): الرمز البرمجي + المعدود جمعًا مجرورًا => مثال: 3 حروف، 9 متعلمين، 7 نتائج
  - 11-99 (many): الرمز البرمجي + المعدود مفردًا منصوبًا => مثال: 21 حرفًا، 99 نتيجة، 72 متعلمًا
  - ألفاظ العقود (other): الرمز البرمجي + المعدود مفردًا مجرورًا => مثال: 100 حرفٍ، 1000 طالبٍ

حالة الرمز # (في صيغ مثل "# components"):
  - 0 => لا مكوّن
  - 1 => مكوّن واحد
  - 2 => مكونان
  - 3-10 (few) => # مكونات
  - 11-99 (many) => # مكونًا
  - ألفاظ العقود (other) => # مكوّنٍ

============================================
7) صيغ المفرد والجمع بنسق ICU Message Format Unicode
============================================
بعض المدخلات تحتاج لترجمة كاملة مع صيغة الجمع البرمجية. انتبه عند ترجمة مدخل يحوي أقواسًا معقوفة تحوي مصطلحات مثل "plural" و"other".

مثال أساسي: "Used in {len, plural, one {1 location} other {{len} locations}}"
الصيغة المعتمدة (خمس صيغ):
{len, plural, one {موقع واحد} two {موقعين} few {# مواقع} many {# موقعًا} other {# موقع}}

المهم: لا تنسَ وضع علامة الرقم # في موضعها الصحيح في few وmany وother.

============================================

============================================
في الترجمات التي تحتوي عربية وإنجليزية مع أقواس وعلامات ترقيم قد تظهر بشكل معكوس. الحل: استخدام علامة RIGHT-TO-LEFT MARK بعد الكلمات العربية وقبل الكلمات الإنجليزية.

============================================

11) التشكيل (الحركات وعلامات الضبط)
============================================
نميل إلى تبسيط اللغة العربية والابتعاد عن التشكيل قدر الإمكان، إلا في المواضع التي يسبب فيها غياب التشكيل لبسًا في المعنى.
- أرسل (فعل ماض): بلا تشكيل
- أرسِل (أمر): بكسرة واحدة
- أُرسِل (مبني للمجهول): بضمة وكسرة
- تنوين الفتح يُكتب على الألف لا على الحرف الذي قبلها. هذه قاعدة صارمة لا استثناء فيها.
  الصواب: قسمًا، مساقًا، متعلمًا، حرفًا، موقعًا، مكوّنًا (التنوين دائمًا على الألف)
  الخطأ: قسمًا، مساقًا، متعلمًا (التنوين على الحرف قبل الألف)
  كذلك تنوين الضم والكسر: مساقٍ، مساقٌ — الحركة على الحرف الأخير مباشرة.

- راعِ علامات الإعراب الصحيحة: "شُكِّل المتعلمون" (في موضع الرفع) لا "المتعلمين".
- الهمزات: استخدم الهمزات حسب قواعد همزة الوصل وهمزة القطع الصحيحة.

أولًا، Context: عند وجود لبس في مقصد الترجمة، انظر في قسم Context أسفل السلسلة النصية. قد يُكتب "Btn" أو "button" للدلالة على أن المقصود فعل أمر على زر.
ثانيًا، Suggestion: تُعرض ترجمات متشابهة يمكن الاستفادة منها إذا كانت من أعضاء فريق الترجمة المعتمدين (لا من AI أو edx_transifex_bot أو Google).

der History", "ar": "سِجل الطلبات"}, {"en": "Something has gone wrong ending your exam. Please reload the page and start again.", "ar": "حدث خطأ ما أثناء انهاء امتحانك. من فضلك أعِد تحميل الصفحة وابدأ من جديد."}, {"en": "Something has gone wrong starting your exam. Please reload the page and start again.", "ar": "حدث خطأ ما أثناء بدء امتحانك. من فضلك أعِد تحميل الصفحة وابدأ من جديد."}, {"en": "Your onboarding profile has been approved. However, your onboarding status is expiring soon. Please complete onboarding again to ensure that you will be able to continue taking proctored exams.", "ar": "تمت الموافقة على ملف تسجيلك. ومع ذلك ستنتهي صلاحية تسجيلك قريباً. يرجى إتمام التسجيل مجدداً لتتأكد من قدرتك على مواصلة إجراء الامتحانات المراقبة."}, {"en": "Your onboarding status has expired. Please complete onboarding again to continue taking proctored exams.", "ar": "لقد انتهت صلاحية تسجيلك. يُرجى إتمام التسجيل مجدداً لمواصلة إجراء الامتحانات المراقبة."}, {"en": "Cookie Policy", "ar": "سياسة ملفات تعريف الارتباط"}, {"en": "Powered by", "ar": "مبني على"}, {"en": "Studio Accessibility Policy| {siteName}", "ar": "سياسة إتاحة الوصول لذوي الاحتياجات الخاصة إلى الاستوديو| {siteName}"}, {"en": "{notice} Do not modify these policies unless you are familiar with their purpose.", "ar": "{notice} لا تعدّل هذه السياسات إلا إذا كنت على دراية بالغرض منها."}, {"en": "No validation is performed on policy keys or value pairs. If you are having difficulties, check your formatting.", "ar": "لم يُتحقق من صحة أزواج المفاتيح والقِيم المتعلقة بالسياسات. إذا كنت تواجه أيّ مشكلة، فتحقق من تنسيق الإدخال."}, {"en": "This course has protected exam setting that are incomplete or invalid.", "ar": "يحتوي هذا المساق على إعدادات امتحان محمية غير مكتملة أو غير صالحة."}, {"en": "You haven't added any certificates to this course yet.", "ar": "لم تُضِف أيّ شهادات لهذا المساق بعد."}, {"en": "Add your first certificate", "ar": "أضِف أول شهادة لك"}, {"en": "Best practices checklist", "ar": "قائمة التحقق من الممارس es at the top of your course and use the links to navigate.", "ar": "يرى الطلاب الصفحات الافتراضية والمخصصة في أعلى مساقك، ويستخدمون الروابط للتنقل."}, {"en": "See an example", "ar": "شاهِد مثالاً على ذلك"}, {"en": "Pages appear in your course's top navigation bar. The default pages (Home, Course, Discussion, Wiki, and Progress) are followed by textbooks and custom pages.", "ar": "تظهر الصفحات في شريط التنقل العلوي من مساقك، حيث تُدرج الصفحات الافتراضية (الصفحة الرئيسية، والمساق، والمناقشة، وموسوعة ويكي، والعلامات) أولاً، متبوعة بالكتب والصفحات المخصصة."}, {"en": "Empty", "ar": "فارغ"}, {"en": "Course export", "ar": "تصدير المساق"}, {"en": "You can export courses and edit them outside of {studioShortName}. The exported file is a .tar.gz file (that is, a .tar file compressed with GNU Zip) that contains the course structure and content. You can also re-import courses that you've exported.", "ar": "يمكنك تصدير المساقات وتعديلها خارج {studioShortName}. يُصدَّر الملف بصيغة .tar.gz (أي؛ ملف .tar مضغوط باستخدام GNU Zip) والذي يحتوي على بنية المساق ومحتواه. يمكنك أيضاً إعادة استيراد المساقات التي صدّرتها."}, {"en": "Export course content", "ar": "صدِّر محتوى المساق"}, {"en": "Settings", "ar": "الإعدادات"}, {"en": "Overall grade range", "ar": "نطاق الدرجات الكلي"}, {"en": "Contains {len, plural, one {1 group} other {{len} groups}}", "ar": "يحتوي على {len, plural, one {1 group} other {{len} groups}}"}, {"en": "Not in use", "ar": "غير مستخدم"}, {"en": "Outline", "ar": "المخطط"}, {"en": "Textbooks", "ar": "الكتب"}, {"en": "Secondary", "ar": "ثانوي"}, {"en": "The course that you import must be in a .tar.gz file (that is, a .tar file compressed with GNU Zip). This .tar.gz file must contain a course.xml file. It may also contain other files.", "ar": "يجب أن يكون المساق الذي تستورده في ملف بصيغة .tar.gz (أي؛ ملف .tar مضغوط ببرنامج GNU Zip). ويجب أن يحتوي ملف .tar.gz هذا على ملف باسم course.xml، ويمكن أن يحتوي على ملفات أخرى."}, {"en": "Scan my course for broken links", "ar": "افحص مساقي بحثاً عن راوبط معطلة"}, {"en": "Scan my course for broken links", "ar": "افحص مساقي بحثاً عن راوبط معطلة"}, {"en": "Preparing", "ar": "تحضير"}, {"en": "Preparing to start the scan", "ar": "جاري التحضير الآن لبدء الفحص"}, {"en": "Scanning for broken links in your course (You can now leave this page safely, but avoid making drastic changes to content until the scan is complete)", "ar": "جاري الفحص بحثاً عن روابط معطلة في مساقك (يمكنك الآن مغادرة هذه الصفحة بأمان، ولكن تجنّب إجراء أيّ تغييرات جذرية على المحتوى إلى حين إنتهاء عملية الفحص)"}, {"en": "Success", "ar": "تم الأمر بنجاح"}, {"en": "Your Scan is complete. You can view the list of results below.", "ar": "اكتمل الفحص. يمكنك عرض قائمة النتائج أدناه."}, {"en": "Last scanned on", "ar": "آخر فحص في"}, {"en": "Pages & Resources", "ar": "الصفحات والموارد"}, {"en": "settings", "ar": "الإعدادات"}, {"en": "Enabled", "ar": "مفعل"}, {"en": "Schedule & details", "ar": "المواعيد والتفاصيل"}, {"en": "Settings", "ar": "الإعدادات"}, {"en": "Please address the errors on this page first, and then save your progress.", "ar": "يُرجى تصحيح الأخطاء في هذه الصفحة أولاً، ثم حفظ تقدمك."}, {"en": "At edX, we seek to understand and respect the unique needs and perspectives of the edX global community. We value every course team and are committed to expanding access to all, including course team creators and authors with disabilities. To that end, we have adopted a {communityAccessibilityLink} and this process to allow course team creators and authors to request assistance if they are unable to develop and post content on our platform via Studio because of their disabilities.", "ar": "نسعى في إدكس إلى فهم واحترام الاحتياجات ووجهات النظر الفريدة للمجتمع العالمي لإدكس. نحن نُقدّر جميع فِرق المساقات، ونلتزم بتوسيع إتاحة الوصول للجميع، بما في ذلك مُنشئي فِرق المساقات ومؤلفي المساقات من ذوي الاحتياجات الخاصة. ومن أجل ذلك، اعتمدنا {communityAccessibilityLink}، وهذه العملية تُتيح لهم طلب المساعدة إذا كانوا غير قادرين على تطوير المحتوى ونشره على منصتنا عبر الاستوديو نظراً لظروفهم الخاصة."}, {"en": "Thereafter, we will communicate with you on a weekly basis regarding our evaluation, decision, and progress in implementing the accessibility solution. We will notify you when implementation of your accessibility solution is complete and will follow-up with you as may be necessary to see if the solution was effective.", "ar": "بعد ذلك، سنتواصل معك أسبوعياً بشأن تقييمنا وقرارنا وتقدمّنا في تنفيذ حل إتاحة الوصول لذوي الاحتياجات الخاصة. سنبلّغك عندما يكتمل تنفيذ ذلك، وسنتابع معك عند الحاجة للتأكد من مدى كفاءة الحل."}, {"en": "Please direct any questions or suggestions on how to improve the accessibility of Studio to {emailElement} or use the form below. We welcome your feedback.", "ar": "يُرجى توجيه أيّ أسئلة أو اقتراحات حول كيفية تحسين إتاحة الوصول لذوي الاحتياجات الخاصة إلى الاستوديو، وذلك من خلال إرسالها إلى {emailElement}، أو من خلال استخدام الاستمارة أدناه. نرحب بآرائك وملاحظاتك."}, {"en": "how soon you need access and for how long (e.g., a planned course start date or in connection with a course-related deadline such as a final essay).", "ar": "متى تحتاج إلى إتاحة الوصول، ولكم من الوقت؟ (على سبيل المثال، تاريخ بدء مساق مخطط له أو فيما يتعلق بموعد نهائي مرتبط بالمساق كمقالة نهائية)."}, {"en": "The edX Support Team will respond to confirm receipt and forward your request to the edX Partner Manager for your institution and the edX Website Accessibility Specialist.", "ar": "سوف يرد فريق دعم إدكس ليؤكِّد استلام طلبك، وسيُعيد توجيه طلبك إلى مدير شركاء إدكس الخاص بمؤسستك وإلى اختصاصي إتاحة الوصول لذوي الاحتياجات الخاصة في موقع إدكس."}, {"en": "With guidance from the Website Accessibility Specialist, edX will contact you to discuss your request and gather additional information from you about your preferences and needs, to determine if there's a workable solution that edX is able to support.", "ar": "بتوجيه من اختصاصّي إتاحة الوصول في مواقع الويب، ستتواصل إدكس معك لمناقشة طلبك وجمع معلومات إضافية حول تفضيلاتك واحتياجاتك، لتحدد ما إذا كان هناك حل عملي يمكن لإدكس أن تدعمه."}, {"en": "Studio Accessibility Feedback", "ar": "الملاحظات والآراء المتعلقة بإتاحة الوصول لذوي الاحتياجات الخاصة إلى الاستوديو"}, {"en": "Message", "ar": "الرسالة"}, {"en": "Name", "ar": "الاسم"}, {"en": "Submit Accessibility Feedback Form", "ar": "أرسِل استمارة الملاحظات والآراء المتعلقة بإتاحة الوصول لذوي الاحتياجات الخاصة"}, {"en": "Submit", "ar": "أرسِل"}, {"en": "Enter a valid email address.", "ar": "أدخِل عنوان بريد إلكتروني صالح."}, {"en": "Enter a message.", "ar": "أدخِل رسالة."}, {"en": "Enter a name.", "ar": "أدخِل اسماً."}, {"en": "Change manually", "ar": "عدِّل يدوياً"}, {"en": "Undo changes", "ar": "تراجع عن التغييرات"}, {"en": "Deprecated", "ar": "مهمل"}, {"en": "{notice} When you enter strings as policy values, ensure that you use double quotation marks (“) around the string. Do not use single quotation marks (‘).", "ar": "<span class='notranslate'>{notice}</span> عند إدخال نصوص كقِيم للسياسات، تأكد من استخدامك علامات الاقتباس المزدوجة (“) حول النصوص. لا تستخدم علامات الاقتباس المفردة (‘)."}, {"en": "What do advanced settings do?", "ar": "ما فائدة الإعدادات المتقدمة؟"}, {"en": "Advanced settings control specific course functionality. On this page, you can edit manual policies, which are JSON-based key and value pairs that control specific course settings.", "ar": "تضبط الإعدادات المتقدمة وظائف محددة للمساق. ويمكنك أن تعدّل السياسات يدوياً في هذه الصفحة، والتي هي أزواج مفاتيح وقِيم بصيغة JSON التي تتحكم بإعدادت محدّدة للمساق."}, {"en": "Titles more than 100 characters may prevent students from printing their certificate on a single page.", "ar": "العناوين التي تزيد عن 100 حرفٍ يمكن أن تعيق الطلاب عن طباعة شهادتهم على صفحة واحدة."}, {"en": "Validate assignment deadlines", "ar": "تحقق من المواعيد النهائية لتسليم الواجبات"}, {"en": "Enable and specify weekly highlights to keep learners engaged and on track in your course.", "ar": "فعِّل وعيِّن الأحداث الأسبوعية البارزة للحفاظ على تفاعل المتعلمين وضمان بقائهم على المسار في مساقك."}, {"en": "Add a proctortrack escalation email", "ar": "أضِف بريداً إلكترونياً لتصعيد القضايا المتعلقة بـ proctortrack"}, {"en": "Courses using Proctortrack require an escalation email. Ensure learners and Support can contact your course team regarding proctoring issues (e.g. appeals, exam resets, etc).", "ar": "تتطلب المساقات التي تستخدم Proctortrack بريداً إلكترونياً للتصعيد. تأكد أنّ المتعلمين وفريق الدعم يمكنهم الاتصال بفريق مساقك فيما يتعلق بأمور المراقبة (مثل طلبات الاستئناف وإعادة تعيين الامتحانات وما إلى ذلك)."}, {"en": "Custom due date: {relativeWeeksDue, plural, one {# week} other {# weeks}} from enrollment", "ar": "موعد الاستحقاق المخصص: {relativeWeeksDue, plural, one {# week} other {# weeks}} من التسجيل"}, {"en": "Promote another member to Admin to remove your admin rights", "ar": "يُرجى ترقية عضو آخر ليكون مشرفاً لتتمكن من إلغاء حقوقك كمشرف"}, {"en": "Tools with no support are not maintained by the Open edX community, and might be deprecated in the future. They are not recommended for use in courses due to non-compliance with one or more of the base requirements, such as testing, accessibility, internationalization, and documentation.", "ar": "الأدوات غير المدعومة لا يتم صيانتها بواسطة مجتمع أوبن إدكس، وقد تُهمل في المستقبل. ولا يُنصح باستخدامها في المساقات بسبب عدم امتثالها لواحد أو أكثر من المتطلبات الأساسية، مثل الاختبار وإتاحة الوصول لذوي الاحتياجات الخاصة والتدويل والتوثيق."}, {"en": "Provisionally supported tools might lack the robustness of functionality that your courses require. Open edX does not have control over the quality of the software, or of the content that can be provided using these tools. Test these tools thoroughly before using them in your course, especially in graded sections. Complete documentation might not be available for provisionally supported tools, or documentation might be available from sources other than the Open edX community.", "ar": "قد تفتقر الأدوات المدعومة مؤقتاً إلى متانة الوظيفة التي تتطلبها مساقاتك. لا يمتلك أوبن إدكس السيطرة على جودة النظام أو المحتوى الذي يمكن توفيره باستخدام هذه الأدوات. اختبِر هذه الأدوات جيداً قبل استخدامها في مساقك، خصوصاً في الأقسام المقيّمة. قد لا تكون الوثائق الكاملة متاحة للأدوات المدعومة مؤقتاً، أو قد تكون الوثائق متاحة من مصادر أخرى غير مجتمع أوبن إدكس."}, {"en": "Values from Advanced settings, including MATLAB API keys and LTI passports", "ar": "القِيم من الإعدادات المتقدمة، بما في ذلك مفاتيح MATLAB API ومعلومات استيثاق LTI"}, {"en": "Creating the export data files (You can now leave this page safely, but avoid making drastic changes to content until this export is complete)", "ar": "ملفات تصدير البينات قيد الإنشاء (يمكنك الآن مغادرة هذه الصفحة بأمان، ولكن تجنّب إجراء أيّ تغييرات جذرية على المحتوى إلى حين إنتهاء عملية التصدير هذه)"}, {"en": "Want to continue editing in Studio during this upload?", "ar": "هل تريد متابعة التعديل في الاستوديو خلال عملية رفع هذا الملف؟"}, {"en": "Make this subsection available as a prerequisite to other content", "ar": "اجعل هذا القسم الفرعي متاحاً كمتطلب مسبق لمحتوى آخر"}, {"en": "Select a prerequisite subsection and enter a minimum score percentage and minimum completion percentage to limit access to this subsection. Allowed values are 0-100", "ar": "حدد قسماً فرعياً كمتطلب، ثم أدخِل النسبة المئوية الأدنى للدرجة والحد الأدنى لنسبة الإنجاز، لتقييد الوصول إلى هذا القسم الفرعي، القِيم المسموح بها هي 0-100"}, {"en": "No prerequisite", "ar": "لا يوجد متطلبات مسبقة"}, {"en": "Leeway on due dates", "ar": "المهلة المتاحة قبل موعد الاستحقاق"}, {"en": "Add your first content group", "ar": "أضِف مجموعة المحتوى الأولى لك"}, {"en": "Expanding and preparing folder/file structure (You can now leave this page safely, but avoid making drastic changes to content until this import is complete)", "ar": "جاري تكبير وتحضير بنية الملف/المجلد (يمكنك الآن مغادرة هذه الصفحة بأمان، ولكن تجنّب إجراء أيّ تغييرات جذرية على المحتوى إلى أن تنتهي عملية الاستيراد هذه)"}, {"en": "No broken links found", "ar": "ل async function loadDataSafe(key,fallback){
  try{const r=await window.storage.get(key,false);if(r&&r.value){try{return{value:JSON.parse(r.value),existed:true};}catch{return{value:fallback,existed:true};}}return{value:fallback,existed:false};}
  catch{return{value:fallback,existed:'unknown'};}
}
async function saveData(key,val){try{await window.storage.set(key,JSON.stringify(val),false);}catch(e){console.error(e);}}
async function saveRaw(key,val){try{await window.storage.set(key,val,false);}catch(e){console.error(e);}}

async function callClaude(system,userMsg,apiKey){
  const res=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,system,messages:[{role:"user",content:userMsg}]})
  });
  const data=await res.json();
  if(data.error)throw new Error(data.error.message);
  return data.content.map(b=>b.text||"").join("\n");
}

  function buildSystem(userMsg=""){
    let s=`أنت مساعد متخصص في ترجمة واجهات برمجية (Open edX) من الإنجليزية إلى العربية. اتبع الدليل التالي بدقة متناهية:\n\n${guideline}\n\n`;
    if(examples.length>0){
      s+="\nأمثلة مرجعية معتمدة — استخدمها لاستنباط الأسلوب والمصطلحات، وطبّق نفس النهج على النص الجديد:\n";
      const query=userMsg.toLowerCase();
      // المطابق تماماً
      const exact=examples.filter(e=>e.en.toLowerCase()===query.trim().replace(/^النص الإنجليزي:\n/,'').trim());
      // المشابه بكلمات مشتركة (أولوية للجودة)
      const relevant=examples.filter(e=>!exact.includes(e)&&e.en.toLowerCase().split(' ').some(w=>w.length>4&&query.includes(w)));
      // عينة متنوعة من الباقي لتغطية أوسع لأسلوب الدليل
      const others=examples.filter(e=>!exact.includes(e)&&!relevant.includes(e)).filter((_,i)=>i%9===0).slice(0,50);
      const selected=[...exact,...relevant,...others];
      selected.forEach(e=>{s+=`- "${e.en}" => "${e.ar}"\n`;});
    }
    s+="\nمهمتك: ترجم النص الإنجليزي المعطى إلى العربية وفق هذه القواعد بدقة. أعد فقط الترجمة العربية النهائية دون أي شرح أو مقدمات أو علامات اقتباس إضافية. حافظ على المتغيرات والأكواد البرمجية كما هي.";
    return s;
  }

  async function handleTranslate(){
    if(!input.trim()||loading)return;
    // بحث عن مطابق تام في الأمثلة
    const exact=examples.find(e=>e.en.trim().toLowerCase()===input.trim().toLowerCase());
    if(exact){setTranslation(exact.ar);setActiveStatus(null);setEditFeedback("");setError("");return;}
    if(!apiKey.trim()){setError("يرجى إدخال مفتاح Anthropic API أولاً");setShowKey(true);return;}
    setLoading(true);setError("");setTranslation("");setActiveStatus(null);setEditFeedback("");
    try{
      let p=`النص الإنجليزي:\n${input}`;
      if(contextInfo.trim())p+=`\n\nسياق إضافي:\n${contextInfo.trim()}`;
      setTranslation((await callClaude(buildSystem(p),p,apiKey)).trim());
    }catch(e){setError("خطأ: "+e.message);}finally{setLoading(false);}
  }

  async function handleRetranslate(){
    if(!editFeedback.trim()||loading)return;
    setLoading(true);setError("");
    try{
      const p=`النص الإنجليزي:\n${input}\n\nالترجمة السابقة المقترحة:\n${translation}\n\nملاحظات التعديل المطلوبة:\n${editFeedback}\n\nأعد ترجمة محسّنة تأخذ هذه الملاحظات في الحسبان مع الالتزام الكامل بالدليل. أعد فقط النص العربي النهائي.`;
      setTranslation((await callClaude(buildSystem(),p,apiKey)).trim());
      setActiveStatus(null);
    }catch(e){setError("خطأ: "+e.message);}finally{setLoading(false);}
  }

  function confirmStatus(status){
    setActiveStatus(status);
    const entry={en:input,ar:translation,status,notes:status==='needs_edit'?editFeedback:'',ts:Date.now()};
    setHistory(p=>[entry,...p]);
    if(status==='perfect'){
      setExamples(p=>{const s=new Set(p.map(x=>x.en.trim()));return s.has(input.trim())?p:[{en:input,ar:translation,ts:Date.now()},...p];});

    setTimeout(()=>{if(bottomRef.current)bottomRef.current.scrollIntoView({behavior:'smooth'});},100);
  }

  function startNew(){setInput("");setContextInfo("");setTranslation("");setActiveStatus(null);setEditFeedback("");setError("");}

  // CSV
  function handleCsvUpload(e){
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=evt=>{
      const lines=evt.target.result.split(/\r?\n/).filter(l=>l.trim());
      const parsed=lines.map(line=>{const cols=line.match(/("([^"]*)"|[^,]+)/g)||[line];const en=(cols[0]||"").replace(/^"|"$/g,"").trim();return{en,ar:"",done:false};}).filter(r=>r.en&&r.en.toLowerCase()!=='source');
      if(!parsed.length){setCsvError("الملف فارغ أو تعذّر قراءته.");return;}
      setCsvStrings(parsed);setCsvIndex(0);setCsvTranslation("");setCsvError("");
    };
    reader.readAsText(file,'UTF-8');e.target.value='';
  }

  async function handleCsvTranslate(){
    const cur=csvStrings[csvIndex];if(!cur||csvLoading)return;
    setCsvLoading(true);setCsvError("");
    try{setCsvTranslation((await callClaude(buildSystem(),`النص الإنجليزي:\n${cur.en}`,apiKey)).trim());}
    catch(e){setCsvError("خطأ: "+e.message);}finally{setCsvLoading(false);}
  }

  function handleCsvApprove(){
    if(!csvTranslation.trim())return;
    const updated=csvStrings.map((s,i)=>i===csvIndex?{...s,ar:csvTranslation.trim(),done:true}:s);
    setCsvStrings(updated);
    setExamples(p=>{const s=new Set(p.map(x=>x.en.trim()));return s.has(csvStrings[csvIndex].en.trim())?p:[{en:csvStrings[csvIndex].en,ar:csvTranslation.trim(),ts:Date.now()},...p];});
    const next=updated.findIndex((s,i)=>i>csvIndex&&!s.done);
    const ni=next!==-1?next:csvIndex+1<updated.length?csvIndex+1:csvIndex;
    setCsvIndex(ni);setCsvTranslation(updated[ni]?.ar||"");
  }

  function handleCsvNav(dir){
    if(csvTranslation.trim())setCsvStrings(p=>p.map((s,i)=>i===csvIndex?{...s,ar:csvTranslation.trim()}:s));
    const next=csvIndex+dir;if(next<0||next>=csvStrings.length)return;
    setCsvIndex(next);setCsvTranslation(csvStrings[next]?.ar||"");
  }

  function exportCsvResults(){
    const rows=csvStrings.map(s=>`"${s.en.replace(/"/g,'""')}","${(s.ar||"").replace(/"/g,'""')}"`).join('\n');
    const blob=new Blob(['source,translation\n'+rows],{type:'text/csv;charset=utf-8;'});
    const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`translated_${csvStrings.filter(s=>s.done).length}_of_${csvStrings.length}.csv`;a.click();URL.revokeObjectURL(url);
  }

  function resetCsv(){setCsvStrings([]);setCsvIndex(0);setCsvTranslation("");setCsvError("");saveData('csv_strings',[]);saveData('csv_index',0);}

  // Transifex
  async function txFetchStrings(){
    if(!txToken.trim()||!txProjectSlug.trim()||!txResourceSlug.trim()){setTxError("يرجى إدخال التوكن والمشروع والمورد أولاً");return;}
    setTxLoading(true);setTxError("");setTxStatus("جارٍ جلب السلاسل النصية...");
    try{
      const parts=txProjectSlug.split(':');
      const org=parts[0];const proj=parts[1]||parts[0];
      let url=`https://rest.api.transifex.com/resource_strings?filter[resource]=o:${org}:p:${proj}:r:${txResourceSlug}`;
      let allData=[];
      let page=1;
      while(url){
        const res=await fetch(url,{headers:{'Authorization':`Bearer ${txToken}`,'Content-Type':'application/vnd.api+json'}});
        if(!res.ok){const err=await res.json();throw new Error(err.errors?.[0]?.detail||`HTTP ${res.status}`);}
        const data=await res.json();
        allData=allData.concat(data.data);
        setTxStatus(`جارٍ الجلب... (${allData.length} حتى الآن)`);
        const nextLink=data.links?.next;
        url=nextLink?(nextLink.startsWith('http')?nextLink:`https://rest.api.transifex.com${nextLink}`):null;
        page++;
        if(page>50)break; // أمان من الحلقات اللانهائية
      }
      const strings=allData.map(s=>({id:s.id,en:s.attributes.strings?.other||s.attributes.strings?.one||s.id,ar:"",done:false}));
      if(!strings.length){setTxError("لم يُعثَر على سلاسل نصية.");setTxLoading(false);return;}
      setTxStrings(strings);setTxIndex(0);setTxTranslation("");
      setTxStatus(`جُلبت ${strings.length} سلسلة نصية (كامل المصدر)`);
    }catch(e){setTxError("خطأ في Transifex: "+e.message);}finally{setTxLoading(false);}
  }

  async function txFetchMeta(stringId){
    if(!txToken.trim())return;
    setTxMetaLoading(true);setTxMeta(null);
    try{
      const translationId=`${stringId}:l:ar`;
      const res=await fetch(`https://rest.api.transifex.com/resource_translations/${encodeURIComponent(translationId)}?include=translator`,{headers:{'Authorization':`Bearer ${txToken}`,'Content-Type':'application/vnd.api+json'}});
      if(!res.ok){setTxMetaLoading(false);return;}
      const data=await res.json();
      const dt=data.data?.attributes?.datetime_translated;
      const translatorRel=data.data?.relationships?.translator?.data;
      let translatorName=translatorRel?.id?.replace('u:','')||null;
      // محاولة الحصول على اسم العرض من included
      if(data.included){
        const u=data.included.find(i=>i.type==='users'&&i.id===translatorRel?.id);
        if(u?.attributes?.username)translatorName=u.attributes.username;
      }
      setTxMeta({translator:translatorName,datetime:dt});
    }catch{setTxMeta(null);}finally{setTxMetaLoading(false);}
  }

  useEffect(()=>{
    if(txStrings.length>0&&txStrings[txIndex]&&txToken.trim()){
      txFetchMeta(txStrings[txIndex].id);
    }
  },[txIndex,txStrings.length]);

    const cur=txStrings[txIndex];if(!cur||txLoading)return;

      const ar=(await callClaude(buildSystem(),`النص الإنجليزي:\n${cur.en}`,apiKey)).trim();

  async function txPushTranslation(){
    const cur=txStrings[txIndex];if(!txTranslation.trim()||!cur)return;
    setTxLoading(true);setTxError("");
    try{
      // معرّف السلسلة بصيغة: o:org:p:project:r:resource:s:HASH
      // معرّف الترجمة بصيغة: o:org:p:project:r:resource:s:HASH:l:ar
      const translationId=`${cur.id}:l:ar`;
      const payload={data:{type:"resource_translations",id:translationId,attributes:{strings:{other:txTranslation}}}};
      const res=await fetch(`https://rest.api.transifex.com/resource_translations/${encodeURIComponent(translationId)}`,{method:"PATCH",headers:{'Authorization':`Bearer ${txToken}`,'Content-Type':'application/vnd.api+json'},body:JSON.stringify(payload)});
      if(!res.ok){const err=await res.json();throw new Error(err.errors?.[0]?.detail||`HTTP ${res.status}`);}
      const updated=txStrings.map((s,i)=>i===txIndex?{...s,ar:txTranslation,done:true}:s);
      setTxStrings(updated);
      setExamples(p=>{const s=new Set(p.map(x=>x.en.trim()));return s.has(cur.en.trim())?p:[{en:cur.en,ar:txTranslation,ts:Date.now()},...p];});
      const next=updated.findIndex((s,i)=>i>txIndex&&!s.done);
      const ni=next!==-1?next:txIndex+1<updated.length?txIndex+1:txIndex;
      setTxIndex(ni);setTxTranslation(updated[ni]?.ar||"");
      setTxStatus(` رُفعت! (${updated.filter(s=>s.done).length}/${updated.length})`);
    }catch(e){setTxError("خطأ في الرفع: "+e.message);}finally{setTxLoading(false);}
  }

  // أمثلة
  function addExample(){if(!newExEn.trim()||!newExAr.trim())return;setExamples(p=>[{en:newExEn.trim(),ar:newExAr.trim(),ts:Date.now()},...p]);setNewExEn("");setNewExAr("");}
  function removeExample(idx){setExamples(e=>e.filter((_,i)=>i!==idx));}
  function updateExample(idx,field,val){setExamples(e=>e.map((x,i)=>i===idx?{...x,[field]:val}:x));}

  async function confirmSave(){
    setSaveStatus('saving');
    try{await window.storage.set('examples',JSON.stringify(examples),false);setSaveStatus('success');setDebugInfo(` ${examples.length} مثال محفوظ`);}
    catch{setSaveStatus('error');}
    setTimeout(()=>setSaveStatus(null),3000);
  }

  function exportExamples(){
    const blob=new Blob([JSON.stringify(examples,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`edx-examples-${examples.length}.json`;a.click();URL.revokeObjectURL(url);
  }

  function importExamplesFile(e){
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=evt=>{try{const d=JSON.parse(evt.target.result);if(Array.isArray(d)){const s=new Set(examples.map(x=>x.en.trim()));const now=Date.now();const toAdd=d.filter(x=>!s.has(x.en.trim())).map(x=>({...x,ts:x.ts||now}));setExamples(p=>[...p,...toAdd]);setDebugInfo(` استُورد ${toAdd.length} مثال جديد`);}}catch{setDebugInfo(" خطأ في قراءة الملف");}};
    reader.readAsText(file);e.target.value='';
  }

  function restoreDefaultExamples(){
    const s=new Set(examples.map(x=>x.en.trim()));
    const toAdd=DEFAULT_EXAMPLES.filter(e=>!s.has(e.en.trim()));
    setExamples(p=>[...p,...toAdd]);
    setDebugInfo(` أُضيف ${toAdd.length} مثال افتراضي جديد`);
  }

  function removeHistory(idx){setHistory(history.filter((_,i)=>i!==idx));}
  function reuseFromHistory(item){setInput(item.en);setTranslation(item.ar);setActiveStatus(item.status);setEditFeedback(item.notes||"");setTab("translate");}

  const cs={background:'rgba(255,255,255,0.95)',borderRadius:'20px',boxShadow:'0 2px 16px rgba(99,102,241,0.08)',border:'1px solid rgba(226,232,240,1)'};
  const bp={background:'linear-gradient(135deg,#4f46e5,#6366f1)',color:'white',border:'none',borderRadius:'12px',padding:'10px 20px',fontWeight:'bold',cursor:'pointer',fontSize:'14px',fontFamily:'inherit'};

  const tabs=[
    {key:'translate',label:' الترجمة',count:null},
    {key:'csv',label:' CSV',count:csvStrings.length>0?`${csvStrings.filter(s=>s.done).length}/${csvStrings.length}`:null},
    {key:'transifex',label:' Transifex',count:txStrings.length>0?`${txStrings.filter(s=>s.done).length}/${txStrings.length}`:null},
    {key:'guideline',label:' الدليل',count:null},
    {key:'examples',label:' الأمثلة',count:examples.length},
    {key:'history',label:' السجل',count:history.length},
  ];

  return(
    <div style={{fontFamily:"'Segoe UI',Tahoma,Arial,sans-serif"}}>

      {/* Header */}
      <div style={{...cs,padding:'20px',marginBottom:'14px'}}>
        <h1 style={{margin:0,fontSize:'22px',background:'linear-gradient(135deg,#4f46e5,#7c3aed)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',fontWeight:'bold'}}> أداة ترجمة أوبن إدكس (إنجليزي ↔ عربي)</h1>
        <p style={{color:'#64748b',fontSize:'13px',margin:'4px 0 0'}}>بُنيت الأداة على دليل ترجمة منصة أوبن إدكس، وبمساعدة الذكاء الاصطناعي الذي يستند إلى الترجمات السابقة المعتمدة داخل الأداة، لإنتاج ترجمات متسقة ودقيقة.</p>
      </div>

      {/* API Key + Cloud Status */}
      <div style={{...cs,padding:0,marginBottom:'14px',display:'flex',overflow:'hidden'}} className="mobile-grid-1">
        <div style={{flex:1,padding:'14px',borderLeft:'2px solid #f1f5f9',display:'flex',alignItems:'center'}}>
          <div style={{display:'flex',alignItems:'center',gap:'6px',
            background:cloudStatus==='connected'?'#f0fdf4':cloudStatus==='error'?'#fef2f2':'#f8fafc',
            border:`2px solid ${cloudStatus==='connected'?'#bbf7d0':cloudStatus==='error'?'#fecaca':'#e2e8f0'}`,
            borderRadius:'10px',padding:'6px 12px'}}>
            <span style={{width:'8px',height:'8px',borderRadius:'50%',display:'inline-block',
              background:cloudStatus==='connected'?'#16a34a':cloudStatus==='error'?'#dc2626':'#94a3b8'}}></span>
            <span style={{fontSize:'12px',fontWeight:'600',
              color:cloudStatus==='connected'?'#15803d':cloudStatus==='error'?'#b91c1c':'#64748b'}}>
              {cloudStatus==='connected'?'محفوظ على السحابة':cloudStatus==='error'?'تعذّر الاتصال بالسحابة':'جارٍ التحقق...'}
            </span>
          </div>
        </div>
        <div style={{flex:2,padding:'14px'}}>
          <div style={{display:'flex',alignItems:'center',gap:'10px',flexWrap:'wrap'}}>
            <span style={{fontSize:'13px',fontWeight:'bold',color:'#374151'}}>Anthropic API Key:</span>
            {showKey
              ?<input type="text" value={apiKey} onChange={e=>setApiKey(e.target.value)} placeholder="sk-ant-..." style={{flex:1,padding:'8px 12px',borderRadius:'10px',border:'2px solid #e2e8f0',fontSize:'13px',minWidth:'200px'}}/>
              :<span style={{fontSize:'13px',color:apiKey?'#16a34a':'#ef4444',fontWeight:'600'}}>{apiKey?'المفتاح موجود':'لم يُدخل بعد'}</span>}
            <button onClick={()=>setShowKey(!showKey)} style={{...bp,padding:'7px 14px',fontSize:'12px'}}>{showKey?'أخفِ':'اكتب المفتاح'}</button>
          </div>
          <p style={{fontSize:'11px',color:'#94a3b8',margin:'6px 0 0'}}>يُحفظ في متصفحك فقط — لا يُرسل لأي جهة غير Anthropic.</p>
        </div>
      </div>

      {/* Tabs */}
      <div className="mobile-tabs" style={{...cs,padding:'8px',marginBottom:'14px',display:'flex',flexWrap:'wrap',gap:'6px',overflowX:'auto'}}>
        {tabs.map(t=>(
          <button key={t.key} onClick={()=>setTab(t.key)} style={{padding:'9px 15px',borderRadius:'10px',fontWeight:'600',fontSize:'13px',cursor:'pointer',border:'2px solid',transition:'all 0.2s',fontFamily:'inherit',whiteSpace:'nowrap',
            ...(tab===t.key?{background:'linear-gradient(135deg,#4f46e5,#6366f1)',color:'white',borderColor:'#4f46e5'}:{background:'#f1f5f9',color:'#374151',borderColor:'#e2e8f0'})}}>
            {t.label}{t.count!==null?` (${t.count})`:''}
          </button>
        ))}
      </div>

      {/* === الترجمة === */}
      {tab==='translate'&&(
        <div className="mobile-grid-1" style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(300px,1fr))',gap:'14px'}}>
          <div style={{...cs,padding:'20px'}}>
            <p style={{fontWeight:'bold',color:'#374151',margin:'0 0 8px',fontSize:'13px'}}>النص الإنجليزي</p>
            <textarea className="ltr-content" style={{width:'100%',border:'2px solid #e2e8f0',borderRadius:'14px',padding:'12px',minHeight:'140px',fontSize:'14px',color:'#1e293b',boxSizing:'border-box'}}
              placeholder="Enter the English string to translate, e.g. 'Save Changes'"
              value={input} onChange={e=>setInput(e.target.value)}
              onKeyDown={e=>{if(e.altKey&&e.key==='Enter'){e.preventDefault();handleTranslate();}}}/>
            <details style={{margin:'8px 0'}}>
              <summary style={{fontSize:'12px',color:'#64748b',cursor:'pointer'}}> سياق إضافي (اختياري)</summary>
              <textarea className="ltr-content" style={{width:'100%',border:'2px solid #e2e8f0',borderRadius:'10px',padding:'10px',minHeight:'55px',fontSize:'12px',marginTop:'6px',boxSizing:'border-box'}}
                placeholder="e.g. Key: course.preview.button — or context about where this string appears"
                value={contextInfo} onChange={e=>setContextInfo(e.target.value)}/>
            </details>
            <div style={{display:'flex',gap:'8px'}}>
              <button onClick={handleTranslate} disabled={loading||!input.trim()} style={{...bp,flex:1,opacity:(loading||!input.trim())?0.5:1}}>
                {loading?'جار الترجمة...':'ترجم'}
              </button>
              <button onClick={startNew} style={{background:'#f1f5f9',border:'2px solid #e2e8f0',borderRadius:'12px',padding:'10px 16px',fontWeight:'600',cursor:'pointer',color:'#374151',fontFamily:'inherit',fontSize:'13px'}}>نص جديد</button>
            </div>
            {error&&<p style={{color:'#ef4444',fontSize:'12px',background:'#fef2f2',borderRadius:'10px',padding:'10px',marginTop:'8px'}}>{error}</p>}
            <p style={{fontSize:'11px',color:'#94a3b8',margin:'8px 0 0'}}>Alt+Enter للترجمة السريعة | الأمثلة المستخدمة: {examples.length}</p>
          </div>

          <div style={{...cs,padding:'20px'}}>
            <p style={{fontWeight:'bold',color:'#374151',margin:'0 0 8px',fontSize:'13px'}}>الترجمة العربية المقترحة</p>
            <div style={{border:'2px solid #f1f5f9',background:'#f8fafc',borderRadius:'14px',padding:'12px',minHeight:'140px'}}>
              {loading?<span style={{color:'#94a3b8',fontSize:'13px'}}> جاري التوليد...</span>
               :translation?<textarea className="rtl-content" dir="rtl" style={{width:'100%',background:'transparent',border:'none',outline:'none',resize:'none',minHeight:'120px',fontSize:'18px',color:'#1e293b',lineHeight:'1.8'}}
                  value={translation} onChange={e=>setTranslation(e.target.value)}/>
               :<span style={{color:'#94a3b8',fontSize:'13px'}}>ستظهر الترجمة هنا بعد الضغط على "ترجم"</span>}
            </div>

            {translation&&!loading&&(
              <div style={{marginTop:'12px',paddingTop:'12px',borderTop:'2px solid #f1f5f9'}}>
                <p style={{fontWeight:'bold',color:'#374151',margin:'0 0 8px',fontSize:'13px'}}>هل هذه الترجمة صحيحة بنسبة 100%؟</p>
                <div style={{display:'flex',gap:'8px',flexWrap:'wrap',marginBottom:'8px'}}>
                  <button onClick={()=>confirmStatus('perfect')} style={{...bp,background:activeStatus==='perfect'?'#15803d':'#16a34a',border:`2px solid ${activeStatus==='perfect'?'#15803d':'#16a34a'}`,fontSize:'13px',padding:'8px 16px'}}>
                     صحيحة 100% — اعتمدها كمثال مرجعي
                  </button>
                  <button onClick={()=>setActiveStatus(activeStatus==='needs_edit'?null:'needs_edit')} style={{padding:'8px 16px',borderRadius:'12px',fontSize:'13px',fontWeight:'bold',cursor:'pointer',fontFamily:'inherit',border:'2px solid #fbbf24',
                    color:activeStatus==='needs_edit'?'#fff':'#b45309',background:activeStatus==='needs_edit'?'#f59e0b':'#fffbeb'}}>
                     تحتاج تعديل
                  </button>
                </div>

                {activeStatus==='needs_edit'&&(
                  <div style={{background:'#fffbeb',border:'2px solid #fde68a',borderRadius:'14px',padding:'12px'}}>
                    <p style={{fontSize:'13px',fontWeight:'bold',color:'#92400e',margin:'0 0 6px'}}>ما هو التعديل المطلوب؟ (سيُستخدم لإعادة الترجمة وتحسينها)</p>
                    <textarea className="rtl-content" dir="rtl" style={{width:'100%',border:'2px solid #fcd34d',borderRadius:'10px',padding:'8px',minHeight:'70px',fontSize:'13px',background:'white',boxSizing:'border-box'}}
                      placeholder="مثال: استخدم 'سجِّل' بدلاً من 'اشترك'، أو احتفظ بصيغة الأمر..."
                      value={editFeedback} onChange={e=>setEditFeedback(e.target.value)}/>
                    <div style={{display:'flex',gap:'8px',marginTop:'8px',flexWrap:'wrap'}}>
                      <button onClick={handleRetranslate} disabled={loading||!editFeedback.trim()} style={{...bp,background:'#f59e0b',fontSize:'13px',padding:'8px 16px',opacity:(loading||!editFeedback.trim())?0.5:1}}>
                        {loading?'':'↺ أعد الترجمة بالملاحظات'}
                      </button>
                      <button onClick={()=>confirmStatus('needs_edit')} style={{background:'#f1f5f9',border:'2px solid #e2e8f0',borderRadius:'10px',padding:'8px 14px',fontWeight:'600',cursor:'pointer',color:'#374151',fontFamily:'inherit',fontSize:'13px'}}>
                        سجِّل الملاحظة في السجل فقط
                      </button>
                    </div>
                  </div>
                )}

                {activeStatus==='perfect'&&(
                  <div style={{background:'#f0fdf4',border:'2px solid #bbf7d0',borderRadius:'12px',padding:'10px',fontSize:'13px',color:'#15803d'}}>
                     تم اعتماد هذه الترجمة وإضافتها كمثال مرجعي لتحسين الترجمات القادمة.
                  </div>
                )}
              </div>
            )}
            <div ref={bottomRef}></div>
          </div>
        </div>
      )}

      {/* === CSV === */}
      {tab==='csv'&&(
        <div style={{display:'flex',flexDirection:'column',gap:'14px'}}>
          <div style={{...cs,padding:'18px',display:'flex',flexWrap:'wrap',gap:'10px',alignItems:'center'}}>
            <label style={{...bp,display:'inline-block',cursor:'pointer'}}>ارفع ملف CSV<input type="file" accept=".csv" onChange={handleCsvUpload} style={{display:'none'}}/></label>
            {csvStrings.length>0&&<>
              <button onClick={exportCsvResults} style={{background:'#eff6ff',border:'2px solid #bfdbfe',borderRadius:'10px',padding:'8px 16px',color:'#1d4ed8',fontWeight:'600',cursor:'pointer',fontSize:'13px',fontFamily:'inherit'}}> تصدير النتائج</button>
              <button onClick={resetCsv} style={{background:'#fef2f2',border:'2px solid #fecaca',borderRadius:'10px',padding:'8px 16px',color:'#dc2626',fontWeight:'600',cursor:'pointer',fontSize:'13px',fontFamily:'inherit'}}> مسح والبدء من جديد</button>
            </>}
            {csvError&&<p style={{color:'#ef4444',fontSize:'13px',width:'100%',margin:0}}>{csvError}</p>}
          </div>
          {csvStrings.length===0
            ?<div style={{...cs,padding:'60px',textAlign:'center',color:'#94a3b8'}}><div style={{fontSize:'48px'}}></div><p style={{margin:'8px 0 0',fontSize:'13px'}}>ارفع ملف CSV يحتوي على سلاسل نصية إنجليزية</p></div>
            :<div className="mobile-grid-1" style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(300px,1fr))',gap:'14px'}}>
              <div style={{...cs,padding:'20px'}}>
                <div style={{marginBottom:'12px'}}>
                  <div style={{display:'flex',justifyContent:'space-between',fontSize:'12px',color:'#64748b',marginBottom:'6px'}}>
                    <span>السلسلة {csvIndex+1} من {csvStrings.length}</span>
                    <span>{csvStrings.filter(s=>s.done).length}  | {csvStrings.filter(s=>!s.done).length} متبقية</span>
                  </div>
                  <div style={{background:'#e2e8f0',borderRadius:'99px',height:'8px'}}>
                    <div style={{height:'8px',borderRadius:'99px',background:'linear-gradient(135deg,#4f46e5,#7c3aed)',width:`${(csvStrings.filter(s=>s.done).length/csvStrings.length)*100}%`,transition:'width 0.5s'}}/>
                  </div>
                </div>
                <p style={{fontWeight:'bold',color:'#374151',margin:'0 0 6px',fontSize:'13px'}}>النص الإنجليزي {csvStrings[csvIndex]?.done&&<span style={{background:'#dcfce7',color:'#16a34a',borderRadius:'99px',padding:'2px 8px',fontSize:'11px'}}></span>}</p>
                <div className="ltr-content" style={{border:'2px solid #f1f5f9',background:'#f8fafc',borderRadius:'12px',padding:'12px',minHeight:'80px',fontSize:'13px',color:'#1e293b'}}>{csvStrings[csvIndex]?.en}</div>
                <div style={{display:'flex',gap:'8px',marginTop:'10px'}}>
                  <button onClick={()=>handleCsvNav(-1)} disabled={csvIndex===0} style={{flex:1,background:'#f1f5f9',border:'2px solid #e2e8f0',borderRadius:'10px',padding:'9px',fontWeight:'700',cursor:'pointer',color:'#374151',fontFamily:'inherit',opacity:csvIndex===0?0.4:1}}> السابق</button>
                  <button onClick={handleCsvTranslate} disabled={csvLoading} style={{...bp,flex:1,opacity:csvLoading?0.5:1}}>{csvLoading?'':' ترجم'}</button>
                  <button onClick={()=>handleCsvNav(1)} disabled={csvIndex===csvStrings.length-1} style={{flex:1,background:'#f1f5f9',border:'2px solid #e2e8f0',borderRadius:'10px',padding:'9px',fontWeight:'700',cursor:'pointer',color:'#374151',fontFamily:'inherit',opacity:csvIndex===csvStrings.length-1?0.4:1}}>القادم </button>
                </div>
              </div>
              <div style={{...cs,padding:'20px'}}>
                <p style={{fontWeight:'bold',color:'#374151',margin:'0 0 8px',fontSize:'13px'}}>الترجمة العربية</p>
                <div style={{border:'2px solid #f1f5f9',background:'#f8fafc',borderRadius:'12px',padding:'12px',minHeight:'100px'}}>
                  {csvLoading?<span style={{color:'#94a3b8',fontSize:'13px'}}> جاري التوليد...</span>
                   :<textarea className="rtl-content" dir="rtl" style={{width:'100%',background:'transparent',border:'none',outline:'none',resize:'none',minHeight:'80px',fontSize:'17px',color:'#1e293b'}}
                      value={csvTranslation} onChange={e=>setCsvTranslation(e.target.value)}
                      onKeyDown={e=>{if(e.altKey&&e.key==='Enter'){e.preventDefault();handleCsvTranslate();}}}
                      placeholder="Alt+Enter للترجمة السريعة"/>}
                </div>
                {csvTranslation&&!csvLoading&&(
                  <button onClick={handleCsvApprove} style={{...bp,width:'100%',marginTop:'10px',background:'#16a34a',border:'2px solid #16a34a',fontSize:'13px',borderRadius:'12px'}}> اعتمدها وانتقل للقادم</button>
                )}
              </div>
            </div>}
        </div>
      )}

      {/* === Transifex === */}
      {tab==='transifex'&&(
        <div style={{display:'flex',flexDirection:'column',gap:'14px'}}>
          <div style={{...cs,padding:'20px'}}>
            <p style={{fontWeight:'bold',color:'#374151',margin:'0 0 12px',fontSize:'13px'}}> إعدادات Transifex</p>
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(220px,1fr))',gap:'10px',marginBottom:'12px'}}>
              <div>
                <label style={{fontSize:'12px',color:'#64748b',display:'block',marginBottom:'4px'}}>API Token</label>
                <div style={{display:'flex',gap:'6px'}}>
                  <input type={showTxToken?'text':'password'} value={txToken} onChange={e=>setTxToken(e.target.value)} placeholder="1/xxxxxxxxxxxxxxxx" style={{flex:1,padding:'8px 10px',borderRadius:'10px',border:'2px solid #e2e8f0',fontSize:'13px'}}/>
                  <button onClick={()=>setShowTxToken(!showTxToken)} style={{...bp,padding:'8px 10px',fontSize:'12px'}}>{showTxToken?'':''}</button>
                </div>
              </div>
              <div>
                <label style={{fontSize:'12px',color:'#64748b',display:'block',marginBottom:'4px'}}>Project (org:project)</label>
                <input type="text" value={txProjectSlug} onChange={e=>setTxProjectSlug(e.target.value)} placeholder="myorg:open-edx" style={{width:'100%',padding:'8px 10px',borderRadius:'10px',border:'2px solid #e2e8f0',fontSize:'13px',boxSizing:'border-box'}}/>
              </div>
              <div>
                <label style={{fontSize:'12px',color:'#64748b',display:'block',marginBottom:'4px'}}>Resource Slug</label>
                <input type="text" value={txResourceSlug} onChange={e=>setTxResourceSlug(e.target.value)} placeholder="django-po" style={{width:'100%',padding:'8px 10px',borderRadius:'10px',border:'2px solid #e2e8f0',fontSize:'13px',boxSizing:'border-box'}}/>
              </div>
            </div>
            <div style={{display:'flex',gap:'8px',flexWrap:'wrap',alignItems:'center'}}>
              <button onClick={txFetchStrings} disabled={txLoading} style={{...bp,opacity:txLoading?0.5:1}}>{txLoading?' جارٍ...':' جلب السلاسل النصية'}</button>
              {txStatus&&<span style={{fontSize:'13px',color:'#16a34a',fontWeight:'600'}}>{txStatus}</span>}
            </div>
            {txError&&<p style={{color:'#ef4444',fontSize:'12px',background:'#fef2f2',borderRadius:'10px',padding:'10px',marginTop:'8px'}}>{txError}</p>}
            <p style={{fontSize:'11px',color:'#94a3b8',margin:'8px 0 0'}}>ملاحظة: يتطلب تشغيل الأداة عبر بروكسي يدعم CORS مع api.transifex.com</p>
          </div>
          {txStrings.length>0&&(
            <div className="mobile-grid-1" style={{display:'grid',gridTemplateColumns:'320px 1fr',gap:'14px',alignItems:'start'}}>
              {/* القائمة الجانبية */}
              <div className="tx-sidebar" style={{...cs,padding:'12px',maxHeight:'650px',display:'flex',flexDirection:'column'}}>
                <div style={{marginBottom:'10px',paddingBottom:'10px',borderBottom:'2px solid #f1f5f9'}}>
                  <div style={{display:'flex',justifyContent:'space-between',fontSize:'12px',color:'#64748b',marginBottom:'6px'}}>
                    <span>{txStrings.filter(s=>s.done).length} مكتملة</span>
                    <span>{txStrings.length} الإجمالي</span>
                  </div>
                  <div style={{background:'#e2e8f0',borderRadius:'99px',height:'6px',marginBottom:'10px'}}>
                    <div style={{height:'6px',borderRadius:'99px',background:'linear-gradient(135deg,#4f46e5,#7c3aed)',width:`${(txStrings.filter(s=>s.done).length/txStrings.length)*100}%`,transition:'width 0.5s'}}/>
                  </div>
                  <input type="text" value={txSearch} onChange={e=>setTxSearch(e.target.value)} placeholder="ابحث في السلاسل..." style={{width:'100%',padding:'7px 10px',borderRadius:'8px',border:'2px solid #e2e8f0',fontSize:'12px',boxSizing:'border-box'}}/>
                  {txSearch.trim()&&<p style={{fontSize:'10px',color:'#94a3b8',margin:'6px 0 0'}}>{txStrings.filter(s=>s.en.toLowerCase().includes(txSearch.toLowerCase())).length} نتيجة</p>}
                </div>
                <div style={{overflowY:'auto',display:'flex',flexDirection:'column',gap:'4px'}}>
                  {txStrings.filter(s=>!txSearch.trim()||s.en.toLowerCase().includes(txSearch.toLowerCase())).map((s)=>{const i=txStrings.indexOf(s);return(
                    <button key={i} onClick={()=>{setTxIndex(i);setTxTranslation(s.ar||"");}} style={{
                      textAlign:'right',padding:'8px 10px',borderRadius:'10px',border:'2px solid',cursor:'pointer',fontFamily:'inherit',
                      background:i===txIndex?'#eef2ff':'transparent',
                      borderColor:i===txIndex?'#4f46e5':'transparent',
                      display:'flex',alignItems:'flex-start',gap:'6px'
                    }}>
                      <span style={{fontSize:'11px',color:s.done?'#16a34a':'#cbd5e1',fontWeight:'bold',minWidth:'14px'}}>{s.done?'✓':i+1}</span>
                      <span className="ltr-content" style={{fontSize:'11px',color:'#475569',textAlign:'left',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',flex:1}}>{s.en}</span>
                    </button>
                  );})}
                </div>
              </div>

              {/* خانة الترجمة الرئيسية */}
              <div style={{...cs,padding:'24px'}}>
                <p style={{fontWeight:'bold',color:'#374151',margin:'0 0 4px',fontSize:'13px'}}>السلسلة {txIndex+1} من {txStrings.length} {txStrings[txIndex]?.done&&<span style={{background:'#dcfce7',color:'#16a34a',borderRadius:'99px',padding:'2px 8px',fontSize:'11px',marginRight:'6px'}}>مكتملة</span>}</p>
                <p style={{fontSize:'10px',color:'#94a3b8',margin:'0 0 6px',direction:'ltr',textAlign:'left'}}>{txStrings[txIndex]?.id}</p>
                {txMetaLoading
                  ?<p style={{fontSize:'11px',color:'#94a3b8',margin:'0 0 10px'}}>جارٍ التحقق من سجل الترجمة...</p>
                  :txMeta&&(txMeta.translator||txMeta.datetime)
                    ?<p style={{fontSize:'11px',color:'#64748b',background:'#f8fafc',borderRadius:'8px',padding:'6px 10px',margin:'0 0 10px'}}>
                        {txMeta.translator&&<span>آخر مترجم: <b>{txMeta.translator}</b></span>}
                        {txMeta.translator&&txMeta.datetime&&<span> · </span>}
                        {txMeta.datetime&&<span>{new Date(txMeta.datetime).toLocaleDateString('ar-IQ',{year:'numeric',month:'short',day:'numeric'})}</span>}
                      </p>
                    :<p style={{fontSize:'11px',color:'#94a3b8',margin:'0 0 10px'}}>لا توجد ترجمة سابقة مسجَّلة لهذه السلسلة</p>}

                <p style={{fontSize:'12px',color:'#64748b',margin:'0 0 6px'}}>النص الإنجليزي</p>
                <div className="ltr-content" style={{border:'2px solid #f1f5f9',background:'#f8fafc',borderRadius:'12px',padding:'14px',minHeight:'70px',fontSize:'15px',color:'#1e293b',marginBottom:'16px'}}>{txStrings[txIndex]?.en}</div>

                <p style={{fontSize:'12px',color:'#64748b',margin:'0 0 6px'}}>الترجمة العربية</p>
                <div style={{border:'2px solid #f1f5f9',background:'#f8fafc',borderRadius:'12px',padding:'14px',minHeight:'100px'}}>
                  {txLoading?<span style={{color:'#94a3b8',fontSize:'13px'}}>جاري التوليد...</span>
                   :<textarea className="rtl-content" dir="rtl" style={{width:'100%',background:'transparent',border:'none',outline:'none',resize:'none',minHeight:'80px',fontSize:'17px',color:'#1e293b'}}
                      value={txTranslation} onChange={e=>setTxTranslation(e.target.value)}
                      placeholder="ستظهر الترجمة هنا — يمكنك تعديلها قبل الرفع"/>}
                </div>

                <div style={{display:'flex',gap:'8px',marginTop:'16px',flexWrap:'wrap'}}>
                  <button onClick={()=>{if(txIndex>0){setTxIndex(txIndex-1);setTxTranslation(txStrings[txIndex-1]?.ar||"");}}} disabled={txIndex===0} style={{background:'#f1f5f9',border:'2px solid #e2e8f0',borderRadius:'10px',padding:'10px 16px',fontWeight:'700',cursor:'pointer',color:'#374151',fontFamily:'inherit',opacity:txIndex===0?0.4:1}}>السابق</button>
                  <button onClick={txTranslateString} disabled={txLoading} style={{...bp,flex:1,opacity:txLoading?0.5:1}}>{txLoading?'...':'ترجم'}</button>
                  <button onClick={()=>{if(txIndex<txStrings.length-1){setTxIndex(txIndex+1);setTxTranslation(txStrings[txIndex+1]?.ar||"");}}} disabled={txIndex===txStrings.length-1} style={{background:'#f1f5f9',border:'2px solid #e2e8f0',borderRadius:'10px',padding:'10px 16px',fontWeight:'700',cursor:'pointer',color:'#374151',fontFamily:'inherit',opacity:txIndex===txStrings.length-1?0.4:1}}>التالي</button>
                </div>

                {txTranslation&&!txLoading&&(
                  <button onClick={txPushTranslation} style={{...bp,width:'100%',marginTop:'10px',background:'#0369a1',border:'2px solid #0369a1',fontSize:'13px',borderRadius:'12px'}}>
                    ارفع إلى Transifex
                  </button>
                )}
              </div>
            </div>
          )}
        </div>
      )}

      {/* === الدليل === */}
      {tab==='guideline'&&(
        <div style={{...cs,padding:'20px'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'10px',flexWrap:'wrap',gap:'8px'}}>
            <p style={{fontWeight:'bold',color:'#374151',margin:0,fontSize:'13px'}}>دليل الترجمة (يُستخدم كقاعدة لكل الترجمات)</p>
            <div style={{display:'flex',gap:'8px'}}>
              <button onClick={async()=>{
                try{
                  await window.storage.set('guideline',JSON.stringify(guideline),false);
                  setSaveStatus('success');
                }catch(e){setSaveStatus('error');}
                setTimeout(()=>setSaveStatus(null),2000);
              }} style={{...bp,fontSize:'12px',padding:'7px 14px',background:saveStatus==='success'?'#15803d':'#16a34a',border:'none'}}>
                {saveStatus==='success'?'تم الحفظ':saveStatus==='error'?'خطأ':'احفظ'}
              </button>
              <button onClick={()=>setGuideline(DEFAULT_GUIDELINE)} style={{background:'#f1f5f9',border:'2px solid #e2e8f0',borderRadius:'10px',padding:'7px 14px',fontWeight:'600',cursor:'pointer',color:'#374151',fontSize:'12px',fontFamily:'inherit'}}>↺ إعادة الافتراضي</button>
            </div>
          </div>
          <textarea className="rtl-content" dir="rtl" style={{width:'100%',border:'2px solid #e2e8f0',borderRadius:'14px',padding:'16px',minHeight:'500px',fontSize:'12px',lineHeight:'1.8',fontFamily:'monospace',boxSizing:'border-box'}} value={guideline} onChange={e=>setGuideline(e.target.value)}/>
        </div>
      )}

      {/* === الأمثلة === */}
      {tab==='examples'&&(
        <div style={{...cs,padding:'20px'}}>
          <div style={{marginBottom:'14px'}}>
            <p style={{fontWeight:'bold',color:'#374151',margin:'0 0 8px',fontSize:'13px'}}>إضافة مثال جديد</p>
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(200px,1fr))',gap:'10px'}}>
              <textarea className="ltr-content" style={{border:'2px solid #e2e8f0',borderRadius:'10px',padding:'8px',fontSize:'13px',minHeight:'60px',boxSizing:'border-box'}} placeholder="English text" value={newExEn} onChange={e=>setNewExEn(e.target.value)}/>
              <textarea className="rtl-content" dir="rtl" style={{border:'2px solid #e2e8f0',borderRadius:'10px',padding:'8px',fontSize:'14px',minHeight:'60px',boxSizing:'border-box'}} placeholder="الترجمة العربية" value={newExAr} onChange={e=>setNewExAr(e.target.value)}/>
            </div>
            <button onClick={addExample} disabled={!newExEn.trim()||!newExAr.trim()} style={{...bp,marginTop:'8px',fontSize:'13px',padding:'8px 18px',opacity:(!newExEn.trim()||!newExAr.trim())?0.4:1}}> إضافة المثال</button>
          </div>

          <div style={{borderTop:'2px solid #f1f5f9',paddingTop:'14px'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'10px',flexWrap:'wrap',gap:'8px'}}>
              <p style={{fontWeight:'bold',color:'#374151',margin:0,fontSize:'13px'}}> الأمثلة المرجعية الحالية ({examples.length})</p>
            </div>
            <div style={{display:'flex',flexWrap:'wrap',gap:'8px',marginBottom:'12px'}}>
              <button onClick={confirmSave} style={{...bp,fontSize:'12px',padding:'7px 14px',background:saveStatus==='success'?'#16a34a':saveStatus==='error'?'#dc2626':'#16a34a',border:'none'}}>
                {saveStatus==='saving'?' جاري...':saveStatus==='success'?' تم الحفظ!':saveStatus==='error'?' خطأ':' احفظ'}
              </button>
              <button onClick={restoreDefaultExamples} style={{background:'#f1f5f9',border:'2px solid #e2e8f0',borderRadius:'10px',padding:'7px 14px',fontWeight:'600',cursor:'pointer',color:'#374151',fontSize:'12px',fontFamily:'inherit'}}>↺ استعادة الافتراضية</button>
              <button onClick={exportExamples} style={{background:'#eff6ff',border:'2px solid #bfdbfe',borderRadius:'10px',padding:'7px 14px',color:'#1d4ed8',fontWeight:'600',cursor:'pointer',fontSize:'12px',fontFamily:'inherit'}}> تصدير نسخة احتياطية</button>
              <label style={{background:'#eff6ff',border:'2px solid #bfdbfe',borderRadius:'10px',padding:'7px 14px',color:'#1d4ed8',fontWeight:'600',cursor:'pointer',fontSize:'12px'}}> استيراد ملف<input type="file" accept=".json" onChange={importExamplesFile} style={{display:'none'}}/></label>
            </div>
            {debugInfo&&<p style={{fontSize:'11px',color:'#94a3b8',background:'#f8fafc',borderRadius:'8px',padding:'6px 10px',fontFamily:'monospace',marginBottom:'10px'}}>{debugInfo}</p>}
            <input type="text" value={exSearch} onChange={e=>setExSearch(e.target.value)} placeholder="ابحث في الأمثلة (إنجليزي أو عربي)..." style={{width:'100%',padding:'10px 14px',borderRadius:'12px',border:'2px solid #e2e8f0',fontSize:'13px',marginBottom:'12px',boxSizing:'border-box'}}/>
            {exSearch.trim()&&<p style={{fontSize:'11px',color:'#64748b',marginBottom:'8px'}}>{examples.filter(ex=>ex.en.toLowerCase().includes(exSearch.toLowerCase())||ex.ar.includes(exSearch)).length} نتيجة من {examples.length}</p>}
            {examples.length===0?<p style={{fontSize:'13px',color:'#94a3b8'}}>لا توجد أمثلة. الترجمات التي تعتمدها كـ "صحيحة 100%" تُضاف هنا تلقائيًا.</p>
             :<div className="ex-list" style={{maxHeight:'500px',overflowY:'auto',display:'flex',flexDirection:'column',gap:'8px'}}>
                {examples.filter(ex=>!exSearch.trim()||ex.en.toLowerCase().includes(exSearch.toLowerCase())||ex.ar.includes(exSearch)).map((ex)=>{const idx=examples.indexOf(ex);return(
                  <div key={idx} style={{border:'2px solid #f1f5f9',borderRadius:'14px',padding:'10px',background:'rgba(255,255,255,0.7)',display:'flex',gap:'10px',alignItems:'flex-start'}}>
                    <div style={{flex:1,display:'flex',flexDirection:'column',gap:'5px'}}>
                      <span style={{fontSize:'10px',color:'#94a3b8',direction:'ltr',textAlign:'left'}}>{ex.ts?new Date(ex.ts).toLocaleDateString('ar-IQ',{year:'numeric',month:'short',day:'numeric'}):'تاريخ غير محدد (مثال أساسي)'}</span>
                      <textarea className="ltr-content" style={{width:'100%',border:'1px solid #e2e8f0',borderRadius:'8px',padding:'6px',fontSize:'12px',color:'#374151',background:'#f8fafc',resize:'none',boxSizing:'border-box'}} value={ex.en} onChange={e=>updateExample(idx,'en',e.target.value)} rows={Math.min(3,Math.max(1,Math.ceil((ex.en||"").length/65)))}/>
                      <textarea className="rtl-content" dir="rtl" style={{width:'100%',border:'1px solid #e0e7ff',borderRadius:'8px',padding:'6px',fontSize:'14px',color:'#1e293b',background:'#f5f3ff',fontWeight:'500',resize:'none',boxSizing:'border-box'}} value={ex.ar} onChange={e=>updateExample(idx,'ar',e.target.value)} rows={Math.min(3,Math.max(1,Math.ceil((ex.ar||"").length/65)))}/>
                    </div>
                    <button onClick={()=>removeExample(idx)} style={{background:'none',border:'none',cursor:'pointer',color:'#f87171',fontSize:'16px',padding:'4px'}}></button>
                  </div>
                );})}
              </div>}
          </div>
        </div>
      )}

      {/* === السجل === */}
      {tab==='history'&&(
        <div style={{...cs,padding:'20px'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'10px'}}>
            <p style={{fontWeight:'bold',color:'#374151',margin:0,fontSize:'13px'}}> سجل الترجمات ({history.length})</p>
            {history.length>0&&<button onClick={()=>{const blob=new Blob([JSON.stringify(history,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`history-${history.length}.json`;a.click();}} style={{background:'#eff6ff',border:'2px solid #bfdbfe',borderRadius:'10px',padding:'7px 14px',color:'#1d4ed8',fontWeight:'600',cursor:'pointer',fontSize:'12px',fontFamily:'inherit'}}> تصدير السجل</button>}
          </div>
          {history.length===0?<p style={{fontSize:'13px',color:'#94a3b8'}}>لا توجد ترجمات مسجلة بعد.</p>
           :<div style={{maxHeight:'600px',overflowY:'auto',display:'flex',flexDirection:'column',gap:'8px'}}>
              {history.map((item,idx)=>(
                <div key={idx} style={{border:'2px solid #f1f5f9',borderRadius:'14px',padding:'12px',background:'rgba(255,255,255,0.7)'}}>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:'6px',flexWrap:'wrap',gap:'6px'}}>
                    <span style={{borderRadius:'99px',padding:'3px 10px',fontSize:'11px',fontWeight:'700',
                      ...(item.status==='perfect'?{background:'#dcfce7',color:'#16a34a'}:{background:'#fef3c7',color:'#b45309'})}}>
                      {item.status==='perfect'?' صحيحة 100%':' تحتاج تعديل'}
                    </span>
                    <div style={{display:'flex',gap:'10px',alignItems:'center'}}>
                      {item.ts&&<span style={{fontSize:'10px',color:'#94a3b8'}}>{new Date(item.ts).toLocaleDateString('ar-IQ')}</span>}
                      <button onClick={()=>reuseFromHistory(item)} style={{background:'none',border:'none',color:'#4f46e5',fontSize:'12px',fontWeight:'600',cursor:'pointer',fontFamily:'inherit'}}>إعادة فتح</button>
                      <button onClick={()=>removeHistory(idx)} style={{background:'none',border:'none',color:'#f87171',fontSize:'12px',cursor:'pointer',fontFamily:'inherit'}}>حذف</button>
                    </div>
                  </div>
                  <p className="ltr-content" style={{fontSize:'12px',color:'#64748b',margin:'0 0 4px'}}>{item.en}</p>
                  <p className="rtl-content" dir="rtl" style={{fontSize:'15px',color:'#1e293b',fontWeight:'600',margin:0}}>{item.ar}</p>
                  {item.notes&&<p className="rtl-content" dir="rtl" style={{fontSize:'12px',color:'#b45309',background:'#fef3c7',borderRadius:'8px',padding:'6px 8px',margin:'6px 0 0'}}>ملاحظات: {item.notes}</p>}
                </div>
              ))}
            </div>}
        </div>
      )}
    </div>
  );
}
ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
