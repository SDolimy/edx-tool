const SUPA_HEADERS={"Content-Type":"application/json","apikey":SUPA_KEY,"Authorization":`Bearer ${SUPA_KEY}`};

const supaStore={
  async get(key){
    try{
      const r=await fetch(`${SUPA_URL}/rest/v1/storage?key=eq.${encodeURIComponent(key)}&select=value`,{headers:SUPA_HEADERS});
      if(!r.ok)throw new Error('fetch failed');
      const d=await r.json();
      if(d&&d.length>0){localStorage.setItem(key,d[0].value);return{value:d[0].value};}

      return v?{value:v}:null;
    }catch{
      const v=localStorage.getItem(key);

    }
  },
  async set(key,value){
    try{
      // حذف الصف القديم أولاً ثم إدراج جديد
      await fetch(`${SUPA_URL}/rest/v1/storage?key=eq.${encodeURIComponent(key)}`,{
        method:"DELETE",
        headers:SUPA_HEADERS
      });

        method:"POST",
        headers:{...SUPA_HEADERS,"Prefer":"return=minimal"},
        body:JSON.stringify({key,value})
      });
      if(!r.ok)throw new Error('insert failed');
      localStorage.setItem(key,value);
      return true;
    }catch{
      try{localStorage.setItem(key,value);return true;}catch{return null;}
    }
  }
};

============================================
2) صيغ الأزرار والأوامر
============================================
خيارات القائمة مثل "Quit", "Save", "Edit" وما شابه يجب أن تُترجم إلى العربية بصيغة الأمر، لغرض التطبيع واتباع ما هو موجود، ولكي نعبّر عن تفاعل حيّ أكثر بين المستخدم والجهاز. لهذا أهمية قصوى.
أمثلة:
  - Cancel => ألغِ
  - Discard => تجاهَل
  - Delete => احذِف

(يُستأنس بدليل عربآيز للترجمة للتوجيهات العامة والاقتراحات)

============================================
3) المتغيرات بصيغها المختلفة
============================================
يحتوي النص الإنجليزي على متغيرات بصيغ مختلفة، فلا تترجمها بل دعها كما هي:
- متغيرات تبدأ وتنتهي بأقواس معقوفة: تُترك كما هي ولا تُترجم.
  مثال: "Welcome to {siteName}, {fullName}!" => "مرحبًا بك في {siteName} يا {fullName}!"
- متغيرات تبدأ بـ % متبوعة بأقواس دائرية (ملوّنة بالبرتقالي الفاتح، تُنسخ عند النقر عليها في حقل الترجمة): تُترك كما هي ولا تُترجم.
  مثال: "More information about 1%(name)s" => "المزيد من المعلومات عن 1%(name)s"
- شرطات فاصلة بين الكلمات (مثل alert-confirmation-description): تُترك كما هي ولا تُترجم.
- متغيرات على هيئة كود مثل <%- signatoryName %>: تُترك كما هي.

مثال:

6) صيغ المفرد والجمع (Plural Forms)
============================================
الصيغة المعتمدة هي صيغة مؤسسة عربآيز ذات الست حالات:
"Plural-Forms: nplurals=6; plural=n==0 ? 0 : n==1 ? 1 : n==2 ? 2 : n%100>=3 && n%100<=10 ? 3 : n%100>=11 && n%100<=99 ? 4 : 5;"

ملخص صيغ المفرد والجمع:
  - صفر: لا + المعدود جمعًا منصوبًا => مثال: لا حروف، لا متعلمين
  - واحد: المعدود بصيغة المفرد + واحد => مثال: حرفًا واحدًا، نتيجة واحدة
  - اثنان: المعدود بصيغة المثنى => مثال: حرفين، أو حرفين اثنين
  - 3-10 (few): الرمز البرمجي + المعدود جمعًا مجرورًا => مثال: 3 حروف، 9 متعلمين، 7 نتائج
  - 11-99 (many): الرمز البرمجي + المعدود مفردًا منصوبًا => مثال: 21 حرفًا، 99 نتيجة، 72 متعلمًا
  - ألفاظ العقود (other): الرمز البرمجي + المعدود مفردًا مجرورًا => مثال: 100 حرفٍ، 1000 طالبٍ

حالة الرمز # (في صيغ مثل "# components"):
  - 0 => لا مكوّن
  - 1 => مكوّن واحد
  - 2 => مكونان
  - 3-10 (few) => # مكونات
  - 11-99 (many) => # مكونًا
  - ألفاظ العقود (other) => # مكوّنٍ

============================================
بعض المدخلات تحتاج لترجمة كاملة مع صيغة الجمع البرمجية. انتبه عند ترجمة مدخل يحوي أقواسًا معقوفة تحوي مصطلحات مثل "plural" و"other".

مثال أساسي: "Used in {len, plural, one {1 location} other {{len} locations}}"
الصيغة المعتمدة (خمس صيغ):
{len, plural, one {موقع واحد} two {موقعين} few {# مواقع} many {# موقعًا} other {# موقع}}

المهم: لا تنسَ وضع علامة الرقم # في موضعها الصحيح في few وmany وother.

async function loadDataSafe(key,fallback){
  try{const r=await window.storage.get(key,false);if(r&&r.value){try{return{value:JSON.parse(r.value),existed:true};}catch{return{value:fallback,existed:true};}}return{value:fallback,existed:false};}
  catch{return{value:fallback,existed:'unknown'};}
}
async function saveData(key,val){try{await window.storage.set(key,JSON.stringify(val),false);}catch(e){console.error(e);}}

async function callClaude(system,userMsg,apiKey){
  const res=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01"},
    body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,system,messages:[{role:"user",content:userMsg}]})
  });
  const data=await res.json();
  if(data.error)throw new Error(data.error.message);
  return data.content.map(b=>b.text||"").join("\n");
}

function App(){
  const[guideline,setGuideline]=useState(DEFAULT_GUIDELINE);
  const[examples,setExamples]=useState([]);
  const[history,setHistory]=useState([]);
  const[loaded,setLoaded]=useState(false);
  const[tab,setTab]=useState("translate");
  const[apiKey,setApiKey]=useState("");
  const[showKey,setShowKey]=useState(false);
  // ترجمة فردية
  const[input,setInput]=useState("");
  const[contextInfo,setContextInfo]=useState("");
  const[translation,setTranslation]=useState("");
  const[loading,setLoading]=useState(false);
  const[error,setError]=useState("");
  const[activeStatus,setActiveStatus]=useState(null);
  const[editFeedback,setEditFeedback]=useState("");
  // CSV
  const[csvStrings,setCsvStrings]=useState([]);
  const[csvIndex,setCsvIndex]=useState(0);
  const[csvTranslation,setCsvTranslation]=useState("");
  const[csvLoading,setCsvLoading]=useState(false);
  const[csvError,setCsvError]=useState("");
  // Transifex
  const[txToken,setTxToken]=useState("");
  const[txProjectSlug,setTxProjectSlug]=useState("");
  const[txResourceSlug,setTxResourceSlug]=useState("");
  const[txStrings,setTxStrings]=useState([]);
  const[txIndex,setTxIndex]=useState(0);
  const[txTranslation,setTxTranslation]=useState("");
  const[txLoading,setTxLoading]=useState(false);
  const[txError,setTxError]=useState("");
  const[txStatus,setTxStatus]=useState("");
  const[showTxToken,setShowTxToken]=useState(false);
  // أمثلة
  const[newExEn,setNewExEn]=useState("");
  const[newExAr,setNewExAr]=useState("");
  const[saveStatus,setSaveStatus]=useState(null);
  const[debugInfo,setDebugInfo]=useState("");
  const bottomRef=useRef(null);

  useEffect(()=>{
    (async()=>{
      const sk=await loadDataSafe('api_key',"");
      const tx=await loadDataSafe('tx_token',"");
      const txp=await loadDataSafe('tx_project',"");
      const txr=await loadDataSafe('tx_resource',"");
      const g=await loadDataSafe('guideline',DEFAULT_GUIDELINE);
      const ex=await loadDataSafe('examples',DEFAULT_EXAMPLES);
      const h=await loadDataSafe('history',[]);
      const csv=await loadDataSafe('csv_strings',[]);
      const ci=await loadDataSafe('csv_index',0);
      if(sk.value)setApiKey(sk.value);
      if(tx.value)setTxToken(tx.value);
      if(txp.value)setTxProjectSlug(txp.value);
      if(txr.value)setTxResourceSlug(txr.value);
      setGuideline(g.value);
      if(ex.existed===true){
        const savedSet=new Set(ex.value.map(e=>e.en.trim()));
        const extra=DEFAULT_EXAMPLES.filter(e=>!savedSet.has(e.en.trim()));
        setExamples([...ex.value,...extra]);
      } else {
        setExamples(DEFAULT_EXAMPLES);
      }
      setHistory(h.value);
      if(csv.existed===true&&csv.value.length>0){setCsvStrings(csv.value);setCsvIndex(ci.value||0);setCsvTranslation(csv.value[ci.value||0]?.ar||"");}
      setDebugInfo(`الأمثلة: ${ex.existed===true?ex.value.length:DEFAULT_EXAMPLES.length} | التخزين: ${ex.existed===true?'موجود':'أول استخدام'}`);
      setLoaded(true);
    })();
  },[]);

  useEffect(()=>{if(loaded)saveData('guideline',guideline);},[guideline,loaded]);
  useEffect(()=>{if(loaded)saveData('examples',examples);},[examples,loaded]);
  useEffect(()=>{if(loaded)saveData('history',history);},[history,loaded]);
  useEffect(()=>{if(loaded&&apiKey)saveData('api_key',apiKey);},[apiKey,loaded]);
  useEffect(()=>{if(loaded&&txToken)saveData('tx_token',txToken);},[txToken,loaded]);
  useEffect(()=>{if(loaded&&txProjectSlug)saveData('tx_project',txProjectSlug);},[txProjectSlug,loaded]);
  useEffect(()=>{if(loaded&&txResourceSlug)saveData('tx_resource',txResourceSlug);},[txResourceSlug,loaded]);
  useEffect(()=>{if(loaded&&csvStrings.length>0){saveData('csv_strings',csvStrings);saveData('csv_index',csvIndex);}},[csvStrings,csvIndex,loaded]);

  function buildSystem(){
    let s=`أنت مساعد متخصص في ترجمة واجهات برمجية (Open edX) من الإنجليزية إلى العربية. اتبع الدليل التالي بدقة متناهية:\n\n${guideline}\n\n`;
    if(examples.length>0){s+="\nأمثلة مرجعية معتمدة (اتبع نفس النمط والمصطلحات):\n";examples.slice(0,70).forEach(e=>{s+=`- "${e.en}" => "${e.ar}"\n`;});}
    s+="\nمهمتك: ترجم النص الإنجليزي المعطى إلى العربية وفق هذه القواعد بدقة. أعد فقط الترجمة العربية النهائية دون أي شرح أو مقدمات أو علامات اقتباس إضافية. حافظ على المتغيرات والأكواد البرمجية كما هي.";
    return s;
  }

  async function handleTranslate(){
    if(!input.trim()||loading)return;
    if(!apiKey.trim()){setError("يرجى إدخال مفتاح Anthropic API أولاً");setShowKey(true);return;}
    setLoading(true);setError("");setTranslation("");setActiveStatus(null);setEditFeedback("");
    try{
      let p=`النص الإنجليزي:\n${input}`;
      if(contextInfo.trim())p+=`\n\nسياق إضافي:\n${contextInfo.trim()}`;
      setTranslation((await callClaude(buildSystem(),p,apiKey)).trim());
    }catch(e){setError("خطأ: "+e.message);}finally{setLoading(false);}
  }

  async function handleRetranslate(){
    if(!editFeedback.trim()||loading)return;
    setLoading(true);setError("");
    try{
      const p=`النص الإنجليزي:\n${input}\n\nالترجمة السابقة المقترحة:\n${translation}\n\nملاحظات التعديل المطلوبة:\n${editFeedback}\n\nأعد ترجمة محسّنة تأخذ هذه الملاحظات في الحسبان مع الالتزام الكامل بالدليل. أعد فقط النص العربي النهائي.`;
      setTranslation((await callClaude(buildSystem(),p,apiKey)).trim());
      setActiveStatus(null);
    }catch(e){setError("خطأ: "+e.message);}finally{setLoading(false);}
  }

  function confirmStatus(status){
    setActiveStatus(status);
    const entry={en:input,ar:translation,status,notes:status==='needs_edit'?editFeedback:'',ts:Date.now()};
    setHistory(p=>[entry,...p]);
    if(status==='perfect'){
      setExamples(p=>{const s=new Set(p.map(x=>x.en.trim()));return s.has(input.trim())?p:[{en:input,ar:translation,ts:Date.now()},...p];});
    }
    setTimeout(()=>{if(bottomRef.current)bottomRef.current.scrollIntoView({behavior:'smooth'});},100);
  }

  function startNew(){setInput("");setContextInfo("");setTranslation("");setActiveStatus(null);setEditFeedback("");setError("");}

  // CSV
  function handleCsvUpload(e){
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=evt=>{
      const lines=evt.target.result.split(/\r?\n/).filter(l=>l.trim());
      const parsed=lines.map(line=>{const cols=line.match(/("([^"]*)"|[^,]+)/g)||[line];const en=(cols[0]||"").replace(/^"|"$/g,"").trim();return{en,ar:"",done:false};}).filter(r=>r.en&&r.en.toLowerCase()!=='source');
      if(!parsed.length){setCsvError("الملف فارغ أو تعذّر قراءته.");return;}
      setCsvStrings(parsed);setCsvIndex(0);setCsvTranslation("");setCsvError("");
    };
    reader.readAsText(file,'UTF-8');e.target.value='';
  }

  async function handleCsvTranslate(){
    const cur=csvStrings[csvIndex];if(!cur||csvLoading)return;
    if(!apiKey.trim()){setCsvError("يرجى إدخال مفتاح API أولاً");setShowKey(true);return;}
    setCsvLoading(true);setCsvError("");
    try{setCsvTranslation((await callClaude(buildSystem(),`النص الإنجليزي:\n${cur.en}`,apiKey)).trim());}
    catch(e){setCsvError("خطأ: "+e.message);}finally{setCsvLoading(false);}
  }

  function handleCsvApprove(){
    if(!csvTranslation.trim())return;
    const updated=csvStrings.map((s,i)=>i===csvIndex?{...s,ar:csvTranslation.trim(),done:true}:s);
    setCsvStrings(updated);
    setExamples(p=>{const s=new Set(p.map(x=>x.en.trim()));return s.has(csvStrings[csvIndex].en.trim())?p:[{en:csvStrings[csvIndex].en,ar:csvTranslation.trim(),ts:Date.now()},...p];});
    const next=updated.findIndex((s,i)=>i>csvIndex&&!s.done);
    const ni=next!==-1?next:csvIndex+1<updated.length?csvIndex+1:csvIndex;
    setCsvIndex(ni);setCsvTranslation(updated[ni]?.ar||"");
  }

  function handleCsvNav(dir){
    if(csvTranslation.trim())setCsvStrings(p=>p.map((s,i)=>i===csvIndex?{...s,ar:csvTranslation.trim()}:s));
    const next=csvIndex+dir;if(next<0||next>=csvStrings.length)return;
    setCsvIndex(next);setCsvTranslation(csvStrings[next]?.ar||"");
  }

  function exportCsvResults(){
    const rows=csvStrings.map(s=>`"${s.en.replace(/"/g,'""')}","${(s.ar||"").replace(/"/g,'""')}"`).join('\n');
    const blob=new Blob(['source,translation\n'+rows],{type:'text/csv;charset=utf-8;'});
    const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`translated_${csvStrings.filter(s=>s.done).length}_of_${csvStrings.length}.csv`;a.click();URL.revokeObjectURL(url);
  }

  function resetCsv(){setCsvStrings([]);setCsvIndex(0);setCsvTranslation("");setCsvError("");saveData('csv_strings',[]);saveData('csv_index',0);}

  // Transifex
  async function txFetchStrings(){
    if(!txToken.trim()||!txProjectSlug.trim()||!txResourceSlug.trim()){setTxError("يرجى إدخال التوكن والمشروع والمورد أولاً");return;}
    setTxLoading(true);setTxError("");setTxStatus("جارٍ جلب السلاسل النصية...");
    try{
      const parts=txProjectSlug.split(':');
      const org=parts[0];const proj=parts[1]||parts[0];
      const url=`https://rest.api.transifex.com/resource_strings?filter[resource]=o:${org}:p:${proj}:r:${txResourceSlug}&limit=250`;
      const res=await fetch(url,{headers:{'Authorization':`Bearer ${txToken}`,'Content-Type':'application/vnd.api+json'}});
      if(!res.ok){const err=await res.json();throw new Error(err.errors?.[0]?.detail||`HTTP ${res.status}`);}
      const data=await res.json();
      const strings=data.data.map(s=>({id:s.id,en:s.attributes.strings?.other||s.attributes.strings?.one||s.id,ar:"",done:false}));
      if(!strings.length){setTxError("لم يُعثَر على سلاسل نصية.");setTxLoading(false);return;}
      setTxStrings(strings);setTxIndex(0);setTxTranslation("");
      setTxStatus(`✅ جُلبت ${strings.length} سلسلة نصية`);
    }catch(e){setTxError("خطأ في Transifex: "+e.message);}finally{setTxLoading(false);}
  }

  async function txTranslateString(){
    const cur=txStrings[txIndex];if(!cur||txLoading)return;
    if(!apiKey.trim()){setTxError("يرجى إدخال مفتاح Anthropic API أولاً");return;}
    setTxLoading(true);setTxError("");
    try{
      const ar=(await callClaude(buildSystem(),`النص الإنجليزي:\n${cur.en}`,apiKey)).trim();
      setTxTranslation(ar);setTxStatus("✅ تمت الترجمة — راجعها ثم اضغط رفع");
    }catch(e){setTxError("خطأ: "+e.message);}finally{setTxLoading(false);}
  }

  async function txPushTranslation(){
    const cur=txStrings[txIndex];if(!txTranslation.trim()||!cur)return;
    setTxLoading(true);setTxError("");
    try{
      const parts=txProjectSlug.split(':');const org=parts[0];const proj=parts[1]||parts[0];
      const payload={data:{type:"resource_translations",attributes:{strings:{other:txTranslation}},relationships:{language:{data:{type:"languages",id:"l:ar"}},resource:{data:{type:"resources",id:`o:${org}:p:${proj}:r:${txResourceSlug}`}}}}};
      const res=await fetch("https://rest.api.transifex.com/resource_translations",{method:"POST",headers:{'Authorization':`Bearer ${txToken}`,'Content-Type':'application/vnd.api+json'},body:JSON.stringify(payload)});
      if(!res.ok){const err=await res.json();throw new Error(err.errors?.[0]?.detail||`HTTP ${res.status}`);}
      const updated=txStrings.map((s,i)=>i===txIndex?{...s,ar:txTranslation,done:true}:s);
      setTxStrings(updated);
      setExamples(p=>{const s=new Set(p.map(x=>x.en.trim()));return s.has(cur.en.trim())?p:[{en:cur.en,ar:txTranslation,ts:Date.now()},...p];});
      const next=updated.findIndex((s,i)=>i>txIndex&&!s.done);
      const ni=next!==-1?next:txIndex+1<updated.length?txIndex+1:txIndex;
      setTxIndex(ni);setTxTranslation(updated[ni]?.ar||"");
      setTxStatus(`✅ رُفعت! (${updated.filter(s=>s.done).length}/${updated.length})`);
    }catch(e){setTxError("خطأ في الرفع: "+e.message);}finally{setTxLoading(false);}
  }

  // أمثلة
  function addExample(){if(!newExEn.trim()||!newExAr.trim())return;setExamples(p=>[{en:newExEn.trim(),ar:newExAr.trim(),ts:Date.now()},...p]);setNewExEn("");setNewExAr("");}
  function removeExample(idx){setExamples(e=>e.filter((_,i)=>i!==idx));}
  function updateExample(idx,field,val){setExamples(e=>e.map((x,i)=>i===idx?{...x,[field]:val}:x));}

  async function confirmSave(){
    setSaveStatus('saving');
    try{await window.storage.set('examples',JSON.stringify(examples),false);setSaveStatus('success');setDebugInfo(`✅ ${examples.length} مثال محفوظ`);}
    catch{setSaveStatus('error');}
    setTimeout(()=>setSaveStatus(null),3000);
  }

  function exportExamples(){
    const blob=new Blob([JSON.stringify(examples,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`edx-examples-${examples.length}.json`;a.click();URL.revokeObjectURL(url);
  }

  function importExamplesFile(e){
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=evt=>{try{const d=JSON.parse(evt.target.result);if(Array.isArray(d)){const s=new Set(examples.map(x=>x.en.trim()));const toAdd=d.filter(x=>!s.has(x.en.trim()));setExamples(p=>[...p,...toAdd]);setDebugInfo(`✅ استُورد ${toAdd.length} مثال جديد`);}}catch{setDebugInfo("❌ خطأ في قراءة الملف");}};
    reader.readAsText(file);e.target.value='';
  }

  function restoreDefaultExamples(){
    const s=new Set(examples.map(x=>x.en.trim()));
    const toAdd=DEFAULT_EXAMPLES.filter(e=>!s.has(e.en.trim()));
    setExamples(p=>[...p,...toAdd]);
    setDebugInfo(`✅ أُضيف ${toAdd.length} مثال افتراضي جديد`);
  }

  function removeHistory(idx){setHistory(history.filter((_,i)=>i!==idx));}
  function reuseFromHistory(item){setInput(item.en);setTranslation(item.ar);setActiveStatus(item.status);setEditFeedback(item.notes||"");setTab("translate");}

  const cs={background:'rgba(255,255,255,0.95)',borderRadius:'20px',boxShadow:'0 2px 16px rgba(99,102,241,0.08)',border:'1px solid rgba(226,232,240,1)'};
  const bp={background:'linear-gradient(135deg,#4f46e5,#6366f1)',color:'white',border:'none',borderRadius:'12px',padding:'10px 20px',fontWeight:'bold',cursor:'pointer',fontSize:'14px',fontFamily:'inherit'};

  const tabs=[
    {key:'translate',label:'✍️ الترجمة',count:null},
    {key:'csv',label:'📄 CSV',count:csvStrings.length>0?`${csvStrings.filter(s=>s.done).length}/${csvStrings.length}`:null},
    {key:'transifex',label:'🔗 Transifex',count:txStrings.length>0?`${txStrings.filter(s=>s.done).length}/${txStrings.length}`:null},
    {key:'guideline',label:'📘 الدليل',count:null},
    {key:'examples',label:'⭐ الأمثلة',count:examples.length},
    {key:'history',label:'🗂️ السجل',count:history.length},
  ];

  return(
    <div style={{fontFamily:"'Segoe UI',Tahoma,Arial,sans-serif"}}>

      {/* Header */}
      <div style={{...cs,padding:'20px',marginBottom:'14px'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:'8px'}}>
          <div>
            <h1 style={{margin:0,fontSize:'22px',background:'linear-gradient(135deg,#4f46e5,#7c3aed)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',fontWeight:'bold'}}>🌐 أداة ترجمة أوبن إدكس (إنجليزي ↔ عربي)</h1>
            <p style={{color:'#64748b',fontSize:'13px',margin:'4px 0 0'}}>مبنية على دليل أسلوب أوبن إدكس الكامل | {examples.length} مثال مرجعي معتمد</p>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:'6px',background:'#f0fdf4',border:'2px solid #bbf7d0',borderRadius:'10px',padding:'6px 12px'}}>
            <span style={{width:'8px',height:'8px',borderRadius:'50%',background:'#16a34a',display:'inline-block'}}></span>
            <span style={{fontSize:'12px',color:'#15803d',fontWeight:'600'}}>محفوظ على السحابة ☁️</span>
          </div>
        </div>
      </div>

      {/* API Key */}
      <div style={{...cs,padding:'14px',marginBottom:'14px'}}>
        <div style={{display:'flex',alignItems:'center',gap:'10px',flexWrap:'wrap'}}>
          <span style={{fontSize:'13px',fontWeight:'bold',color:'#374151'}}>🔑 Anthropic API Key:</span>
          {showKey
            ?<input type="text" value={apiKey} onChange={e=>setApiKey(e.target.value)} placeholder="sk-ant-..." style={{flex:1,padding:'8px 12px',borderRadius:'10px',border:'2px solid #e2e8f0',fontSize:'13px',minWidth:'200px'}}/>
            :<span style={{fontSize:'13px',color:apiKey?'#16a34a':'#ef4444',fontWeight:'600'}}>{apiKey?'✅ مفتاح موجود':'⚠️ لم يُدخل بعد'}</span>}
          <button onClick={()=>setShowKey(!showKey)} style={{...bp,padding:'7px 14px',fontSize:'12px'}}>{showKey?'إخفاء':'إدخال/تعديل'}</button>
        </div>
        <p style={{fontSize:'11px',color:'#94a3b8',margin:'6px 0 0'}}>احصل على المفتاح من console.anthropic.com — يُحفظ في متصفحك فقط.</p>
      </div>

      {/* Tabs */}
      <div style={{...cs,padding:'8px',marginBottom:'14px',display:'flex',flexWrap:'wrap',gap:'6px'}}>
        {tabs.map(t=>(
          <button key={t.key} onClick={()=>setTab(t.key)} style={{padding:'9px 15px',borderRadius:'10px',fontWeight:'600',fontSize:'13px',cursor:'pointer',border:'2px solid',transition:'all 0.2s',fontFamily:'inherit',
            ...(tab===t.key?{background:'linear-gradient(135deg,#4f46e5,#6366f1)',color:'white',borderColor:'#4f46e5'}:{background:'#f1f5f9',color:'#374151',borderColor:'#e2e8f0'})}}>
            {t.label}{t.count!==null?` (${t.count})`:''}
          </button>
        ))}
      </div>

      {/* === الترجمة === */}
      {tab==='translate'&&(
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(300px,1fr))',gap:'14px'}}>
          <div style={{...cs,padding:'20px'}}>
            <p style={{fontWeight:'bold',color:'#374151',margin:'0 0 8px',fontSize:'13px'}}>النص الإنجليزي</p>
            <textarea className="ltr-content" style={{width:'100%',border:'2px solid #e2e8f0',borderRadius:'14px',padding:'12px',minHeight:'140px',fontSize:'14px',color:'#1e293b',boxSizing:'border-box'}}
              placeholder="Enter the English string to translate, e.g. 'Save Changes'"
              value={input} onChange={e=>setInput(e.target.value)}
              onKeyDown={e=>{if(e.altKey&&e.key==='Enter'){e.preventDefault();handleTranslate();}}}/>
            <details style={{margin:'8px 0'}}>
              <summary style={{fontSize:'12px',color:'#64748b',cursor:'pointer'}}>＋ سياق إضافي (اختياري)</summary>
              <textarea className="ltr-content" style={{width:'100%',border:'2px solid #e2e8f0',borderRadius:'10px',padding:'10px',minHeight:'55px',fontSize:'12px',marginTop:'6px',boxSizing:'border-box'}}
                placeholder="e.g. Key: course.preview.button — or context about where this string appears"
                value={contextInfo} onChange={e=>setContextInfo(e.target.value)}/>
            </details>
            <div style={{display:'flex',gap:'8px'}}>
              <button onClick={handleTranslate} disabled={loading||!input.trim()} style={{...bp,flex:1,opacity:(loading||!input.trim())?0.5:1}}>
                {loading?'⏳ جارٍ الترجمة...':'✨ ترجم'}
              </button>
              <button onClick={startNew} style={{background:'#f1f5f9',border:'2px solid #e2e8f0',borderRadius:'12px',padding:'10px 16px',fontWeight:'600',cursor:'pointer',color:'#374151',fontFamily:'inherit',fontSize:'13px'}}>نص جديد</button>
            </div>
            {error&&<p style={{color:'#ef4444',fontSize:'12px',background:'#fef2f2',borderRadius:'10px',padding:'10px',marginTop:'8px'}}>{error}</p>}
            <p style={{fontSize:'11px',color:'#94a3b8',margin:'8px 0 0'}}>Alt+Enter للترجمة السريعة | الأمثلة المستخدمة: {examples.length}</p>
          </div>

          <div style={{...cs,padding:'20px'}}>
            <p style={{fontWeight:'bold',color:'#374151',margin:'0 0 8px',fontSize:'13px'}}>الترجمة العربية المقترحة</p>
            <div style={{border:'2px solid #f1f5f9',background:'#f8fafc',borderRadius:'14px',padding:'12px',minHeight:'140px'}}>
              {loading?<span style={{color:'#94a3b8',fontSize:'13px'}}>⏳ جاري التوليد...</span>
               :translation?<textarea className="rtl-content" dir="rtl" style={{width:'100%',background:'transparent',border:'none',outline:'none',resize:'none',minHeight:'120px',fontSize:'18px',color:'#1e293b',lineHeight:'1.8'}}
                  value={translation} onChange={e=>setTranslation(e.target.value)}/>
               :<span style={{color:'#94a3b8',fontSize:'13px'}}>ستظهر الترجمة هنا بعد الضغط على "ترجم"</span>}
            </div>

            {translation&&!loading&&(
              <div style={{marginTop:'12px',paddingTop:'12px',borderTop:'2px solid #f1f5f9'}}>
                <p style={{fontWeight:'bold',color:'#374151',margin:'0 0 8px',fontSize:'13px'}}>هل هذه الترجمة صحيحة بنسبة 100%؟</p>
                <div style={{display:'flex',gap:'8px',flexWrap:'wrap',marginBottom:'8px'}}>
                  <button onClick={()=>confirmStatus('perfect')} style={{...bp,background:activeStatus==='perfect'?'#15803d':'#16a34a',border:`2px solid ${activeStatus==='perfect'?'#15803d':'#16a34a'}`,fontSize:'13px',padding:'8px 16px'}}>
                    ✅ صحيحة 100% — اعتمدها كمثال مرجعي
                  </button>
                  <button onClick={()=>setActiveStatus(activeStatus==='needs_edit'?null:'needs_edit')} style={{padding:'8px 16px',borderRadius:'12px',fontSize:'13px',fontWeight:'bold',cursor:'pointer',fontFamily:'inherit',border:'2px solid #fbbf24',
                    color:activeStatus==='needs_edit'?'#fff':'#b45309',background:activeStatus==='needs_edit'?'#f59e0b':'#fffbeb'}}>
                    ✏️ تحتاج تعديل
                  </button>
                </div>

                {activeStatus==='needs_edit'&&(
                  <div style={{background:'#fffbeb',border:'2px solid #fde68a',borderRadius:'14px',padding:'12px'}}>
                    <p style={{fontSize:'13px',fontWeight:'bold',color:'#92400e',margin:'0 0 6px'}}>ما هو التعديل المطلوب؟ (سيُستخدم لإعادة الترجمة وتحسينها)</p>
                    <textarea className="rtl-content" dir="rtl" style={{width:'100%',border:'2px solid #fcd34d',borderRadius:'10px',padding:'8px',minHeight:'70px',fontSize:'13px',background:'white',boxSizing:'border-box'}}
                      placeholder="مثال: استخدم 'سجِّل' بدلاً من 'اشترك'، أو احتفظ بصيغة الأمر..."
                      value={editFeedback} onChange={e=>setEditFeedback(e.target.value)}/>
                    <div style={{display:'flex',gap:'8px',marginTop:'8px',flexWrap:'wrap'}}>
                      <button onClick={handleRetranslate} disabled={loading||!editFeedback.trim()} style={{...bp,background:'#f59e0b',fontSize:'13px',padding:'8px 16px',opacity:(loading||!editFeedback.trim())?0.5:1}}>
                        {loading?'⏳':'↺ أعد الترجمة بالملاحظات'}
                      </button>
                      <button onClick={()=>confirmStatus('needs_edit')} style={{background:'#f1f5f9',border:'2px solid #e2e8f0',borderRadius:'10px',padding:'8px 14px',fontWeight:'600',cursor:'pointer',color:'#374151',fontFamily:'inherit',fontSize:'13px'}}>
                        سجِّل الملاحظة في السجل فقط
                      </button>
                    </div>
                  </div>
                )}

                {activeStatus==='perfect'&&(
                  <div style={{background:'#f0fdf4',border:'2px solid #bbf7d0',borderRadius:'12px',padding:'10px',fontSize:'13px',color:'#15803d'}}>
                    ✅ تم اعتماد هذه الترجمة وإضافتها كمثال مرجعي لتحسين الترجمات القادمة.
                  </div>
                )}
              </div>
            )}
            <div ref={bottomRef}></div>
          </div>
        </div>
      )}

      {/* === CSV === */}
      {tab==='csv'&&(
        <div style={{display:'flex',flexDirection:'column',gap:'14px'}}>
          <div style={{...cs,padding:'18px',display:'flex',flexWrap:'wrap',gap:'10px',alignItems:'center'}}>
            <label style={{...bp,display:'inline-block',cursor:'pointer'}}>📂 رفع ملف CSV<input type="file" accept=".csv" onChange={handleCsvUpload} style={{display:'none'}}/></label>
            {csvStrings.length>0&&<>
              <button onClick={exportCsvResults} style={{background:'#eff6ff',border:'2px solid #bfdbfe',borderRadius:'10px',padding:'8px 16px',color:'#1d4ed8',fontWeight:'600',cursor:'pointer',fontSize:'13px',fontFamily:'inherit'}}>⬇️ تصدير النتائج</button>
              <button onClick={resetCsv} style={{background:'#fef2f2',border:'2px solid #fecaca',borderRadius:'10px',padding:'8px 16px',color:'#dc2626',fontWeight:'600',cursor:'pointer',fontSize:'13px',fontFamily:'inherit'}}>🗑️ مسح والبدء من جديد</button>
            </>}
            {csvError&&<p style={{color:'#ef4444',fontSize:'13px',width:'100%',margin:0}}>{csvError}</p>}
          </div>
          {csvStrings.length===0
            ?<div style={{...cs,padding:'60px',textAlign:'center',color:'#94a3b8'}}><div style={{fontSize:'48px'}}>📄</div><p style={{margin:'8px 0 0',fontSize:'13px'}}>ارفع ملف CSV يحتوي على سلاسل نصية إنجليزية</p></div>
            :<div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(300px,1fr))',gap:'14px'}}>
              <div style={{...cs,padding:'20px'}}>
                <div style={{marginBottom:'12px'}}>
                  <div style={{display:'flex',justifyContent:'space-between',fontSize:'12px',color:'#64748b',marginBottom:'6px'}}>
                    <span>السلسلة {csvIndex+1} من {csvStrings.length}</span>
                    <span>{csvStrings.filter(s=>s.done).length} ✅ | {csvStrings.filter(s=>!s.done).length} متبقية</span>
                  </div>
                  <div style={{background:'#e2e8f0',borderRadius:'99px',height:'8px'}}>
                    <div style={{height:'8px',borderRadius:'99px',background:'linear-gradient(135deg,#4f46e5,#7c3aed)',width:`${(csvStrings.filter(s=>s.done).length/csvStrings.length)*100}%`,transition:'width 0.5s'}}/>
                  </div>
                </div>
                <p style={{fontWeight:'bold',color:'#374151',margin:'0 0 6px',fontSize:'13px'}}>النص الإنجليزي {csvStrings[csvIndex]?.done&&<span style={{background:'#dcfce7',color:'#16a34a',borderRadius:'99px',padding:'2px 8px',fontSize:'11px'}}>✅</span>}</p>
                <div className="ltr-content" style={{border:'2px solid #f1f5f9',background:'#f8fafc',borderRadius:'12px',padding:'12px',minHeight:'80px',fontSize:'13px',color:'#1e293b'}}>{csvStrings[csvIndex]?.en}</div>
                <div style={{display:'flex',gap:'8px',marginTop:'10px'}}>
                  <button onClick={()=>handleCsvNav(-1)} disabled={csvIndex===0} style={{flex:1,background:'#f1f5f9',border:'2px solid #e2e8f0',borderRadius:'10px',padding:'9px',fontWeight:'700',cursor:'pointer',color:'#374151',fontFamily:'inherit',opacity:csvIndex===0?0.4:1}}>◀ السابق</button>
                  <button onClick={handleCsvTranslate} disabled={csvLoading} style={{...bp,flex:1,opacity:csvLoading?0.5:1}}>{csvLoading?'⏳':'✨ ترجم'}</button>
                  <button onClick={()=>handleCsvNav(1)} disabled={csvIndex===csvStrings.length-1} style={{flex:1,background:'#f1f5f9',border:'2px solid #e2e8f0',borderRadius:'10px',padding:'9px',fontWeight:'700',cursor:'pointer',color:'#374151',fontFamily:'inherit',opacity:csvIndex===csvStrings.length-1?0.4:1}}>القادم ▶</button>
                </div>
              </div>
              <div style={{...cs,padding:'20px'}}>
                <p style={{fontWeight:'bold',color:'#374151',margin:'0 0 8px',fontSize:'13px'}}>الترجمة العربية</p>
                <div style={{border:'2px solid #f1f5f9',background:'#f8fafc',borderRadius:'12px',padding:'12px',minHeight:'100px'}}>
                  {csvLoading?<span style={{color:'#94a3b8',fontSize:'13px'}}>⏳ جاري التوليد...</span>
                   :<textarea className="rtl-content" dir="rtl" style={{width:'100%',background:'transparent',border:'none',outline:'none',resize:'none',minHeight:'80px',fontSize:'17px',color:'#1e293b'}}
                      value={csvTranslation} onChange={e=>setCsvTranslation(e.target.value)}
                      onKeyDown={e=>{if(e.altKey&&e.key==='Enter'){e.preventDefault();handleCsvTranslate();}}}
                      placeholder="Alt+Enter للترجمة السريعة"/>}
                </div>
                {csvTranslation&&!csvLoading&&(
                  <button onClick={handleCsvApprove} style={{...bp,width:'100%',marginTop:'10px',background:'#16a34a',border:'2px solid #16a34a',fontSize:'13px',borderRadius:'12px'}}>✅ اعتمدها وانتقل للقادم</button>
                )}
              </div>
            </div>}
        </div>
      )}

      {/* === Transifex === */}
      {tab==='transifex'&&(
        <div style={{display:'flex',flexDirection:'column',gap:'14px'}}>
          <div style={{...cs,padding:'20px'}}>
            <p style={{fontWeight:'bold',color:'#374151',margin:'0 0 12px',fontSize:'13px'}}>🔗 إعدادات Transifex</p>
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(220px,1fr))',gap:'10px',marginBottom:'12px'}}>
              <div>
                <label style={{fontSize:'12px',color:'#64748b',display:'block',marginBottom:'4px'}}>API Token</label>
                <div style={{display:'flex',gap:'6px'}}>
                  <input type={showTxToken?'text':'password'} value={txToken} onChange={e=>setTxToken(e.target.value)} placeholder="1/xxxxxxxxxxxxxxxx" style={{flex:1,padding:'8px 10px',borderRadius:'10px',border:'2px solid #e2e8f0',fontSize:'13px'}}/>
                  <button onClick={()=>setShowTxToken(!showTxToken)} style={{...bp,padding:'8px 10px',fontSize:'12px'}}>{showTxToken?'🙈':'👁'}</button>
                </div>
              </div>
              <div>
                <label style={{fontSize:'12px',color:'#64748b',display:'block',marginBottom:'4px'}}>Project (org:project)</label>
                <input type="text" value={txProjectSlug} onChange={e=>setTxProjectSlug(e.target.value)} placeholder="myorg:open-edx" style={{width:'100%',padding:'8px 10px',borderRadius:'10px',border:'2px solid #e2e8f0',fontSize:'13px',boxSizing:'border-box'}}/>
              </div>
              <div>
                <label style={{fontSize:'12px',color:'#64748b',display:'block',marginBottom:'4px'}}>Resource Slug</label>
                <input type="text" value={txResourceSlug} onChange={e=>setTxResourceSlug(e.target.value)} placeholder="django-po" style={{width:'100%',padding:'8px 10px',borderRadius:'10px',border:'2px solid #e2e8f0',fontSize:'13px',boxSizing:'border-box'}}/>
              </div>
            </div>
            <div style={{display:'flex',gap:'8px',flexWrap:'wrap',alignItems:'center'}}>
              <button onClick={txFetchStrings} disabled={txLoading} style={{...bp,opacity:txLoading?0.5:1}}>{txLoading?'⏳ جارٍ...':'📥 جلب السلاسل النصية'}</button>
              {txStatus&&<span style={{fontSize:'13px',color:'#16a34a',fontWeight:'600'}}>{txStatus}</span>}
            </div>
            {txError&&<p style={{color:'#ef4444',fontSize:'12px',background:'#fef2f2',borderRadius:'10px',padding:'10px',marginTop:'8px'}}>{txError}</p>}
            <p style={{fontSize:'11px',color:'#94a3b8',margin:'8px 0 0'}}>ملاحظة: يتطلب تشغيل الأداة عبر بروكسي يدعم CORS مع api.transifex.com</p>
          </div>
          {txStrings.length>0&&(
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(300px,1fr))',gap:'14px'}}>
              <div style={{...cs,padding:'20px'}}>
                <div style={{marginBottom:'12px'}}>
                  <div style={{display:'flex',justifyContent:'space-between',fontSize:'12px',color:'#64748b',marginBottom:'6px'}}>
                    <span>السلسلة {txIndex+1} من {txStrings.length}</span>
                    <span>{txStrings.filter(s=>s.done).length} ✅ | {txStrings.filter(s=>!s.done).length} متبقية</span>
                  </div>
                  <div style={{background:'#e2e8f0',borderRadius:'99px',height:'8px'}}>
                    <div style={{height:'8px',borderRadius:'99px',background:'linear-gradient(135deg,#4f46e5,#7c3aed)',width:`${(txStrings.filter(s=>s.done).length/txStrings.length)*100}%`,transition:'width 0.5s'}}/>
                  </div>
                </div>
                <p style={{fontWeight:'bold',color:'#374151',margin:'0 0 4px',fontSize:'13px'}}>النص الإنجليزي {txStrings[txIndex]?.done&&<span style={{background:'#dcfce7',color:'#16a34a',borderRadius:'99px',padding:'2px 8px',fontSize:'11px'}}>✅</span>}</p>
                <p style={{fontSize:'10px',color:'#94a3b8',margin:'0 0 6px',direction:'ltr',textAlign:'left'}}>{txStrings[txIndex]?.id}</p>
                <div className="ltr-content" style={{border:'2px solid #f1f5f9',background:'#f8fafc',borderRadius:'12px',padding:'12px',minHeight:'80px',fontSize:'13px',color:'#1e293b'}}>{txStrings[txIndex]?.en}</div>
                <div style={{display:'flex',gap:'8px',marginTop:'10px'}}>
                  <button onClick={()=>{if(txIndex>0){setTxIndex(txIndex-1);setTxTranslation(txStrings[txIndex-1]?.ar||"");}}} disabled={txIndex===0} style={{flex:1,background:'#f1f5f9',border:'2px solid #e2e8f0',borderRadius:'10px',padding:'9px',fontWeight:'700',cursor:'pointer',color:'#374151',fontFamily:'inherit',opacity:txIndex===0?0.4:1}}>◀</button>
                  <button onClick={txTranslateString} disabled={txLoading} style={{...bp,flex:2,opacity:txLoading?0.5:1}}>{txLoading?'⏳':'✨ ترجم'}</button>
                  <button onClick={()=>{if(txIndex<txStrings.length-1){setTxIndex(txIndex+1);setTxTranslation(txStrings[txIndex+1]?.ar||"");}}} disabled={txIndex===txStrings.length-1} style={{flex:1,background:'#f1f5f9',border:'2px solid #e2e8f0',borderRadius:'10px',padding:'9px',fontWeight:'700',cursor:'pointer',color:'#374151',fontFamily:'inherit',opacity:txIndex===txStrings.length-1?0.4:1}}>▶</button>
                </div>
              </div>
              <div style={{...cs,padding:'20px'}}>
                <p style={{fontWeight:'bold',color:'#374151',margin:'0 0 8px',fontSize:'13px'}}>الترجمة العربية</p>
                <div style={{border:'2px solid #f1f5f9',background:'#f8fafc',borderRadius:'12px',padding:'12px',minHeight:'100px'}}>
                  {txLoading?<span style={{color:'#94a3b8',fontSize:'13px'}}>⏳ جاري التوليد...</span>
                   :<textarea className="rtl-content" dir="rtl" style={{width:'100%',background:'transparent',border:'none',outline:'none',resize:'none',minHeight:'80px',fontSize:'17px',color:'#1e293b'}}
                      value={txTranslation} onChange={e=>setTxTranslation(e.target.value)}
                      placeholder="ستظهر الترجمة هنا — يمكنك تعديلها قبل الرفع"/>}
                </div>
                {txTranslation&&!txLoading&&(
                  <button onClick={txPushTranslation} style={{...bp,width:'100%',marginTop:'10px',background:'#0369a1',border:'2px solid #0369a1',fontSize:'13px',borderRadius:'12px'}}>
                    🔗 ارفع إلى Transifex
                  </button>
                )}
              </div>
            </div>
          )}
        </div>
      )}

      {/* === الدليل === */}
      {tab==='guideline'&&(
        <div style={{...cs,padding:'20px'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'10px',flexWrap:'wrap',gap:'8px'}}>
            <p style={{fontWeight:'bold',color:'#374151',margin:0,fontSize:'13px'}}>📘 دليل الترجمة (يُستخدم كقاعدة لكل الترجمات)</p>
            <button onClick={()=>setGuideline(DEFAULT_GUIDELINE)} style={{background:'#f1f5f9',border:'2px solid #e2e8f0',borderRadius:'10px',padding:'7px 14px',fontWeight:'600',cursor:'pointer',color:'#374151',fontSize:'12px',fontFamily:'inherit'}}>↺ إعادة الدليل الافتراضي</button>
          </div>
          <textarea className="rtl-content" dir="rtl" style={{width:'100%',border:'2px solid #e2e8f0',borderRadius:'14px',padding:'16px',minHeight:'500px',fontSize:'12px',lineHeight:'1.8',fontFamily:'monospace',boxSizing:'border-box'}} value={guideline} onChange={e=>setGuideline(e.target.value)}/>
          <p style={{fontSize:'11px',color:'#94a3b8',margin:'6px 0 0'}}>يتم حفظ هذا الدليل تلقائيًا وإرساله مع كل طلب ترجمة.</p>
        </div>
      )}

      {/* === الأمثلة === */}
      {tab==='examples'&&(
        <div style={{...cs,padding:'20px'}}>
          <div style={{marginBottom:'14px'}}>
            <p style={{fontWeight:'bold',color:'#374151',margin:'0 0 8px',fontSize:'13px'}}>إضافة مثال جديد</p>
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(200px,1fr))',gap:'10px'}}>
              <textarea className="ltr-content" style={{border:'2px solid #e2e8f0',borderRadius:'10px',padding:'8px',fontSize:'13px',minHeight:'60px',boxSizing:'border-box'}} placeholder="English text" value={newExEn} onChange={e=>setNewExEn(e.target.value)}/>
              <textarea className="rtl-content" dir="rtl" style={{border:'2px solid #e2e8f0',borderRadius:'10px',padding:'8px',fontSize:'14px',minHeight:'60px',boxSizing:'border-box'}} placeholder="الترجمة العربية" value={newExAr} onChange={e=>setNewExAr(e.target.value)}/>
            </div>
            <button onClick={addExample} disabled={!newExEn.trim()||!newExAr.trim()} style={{...bp,marginTop:'8px',fontSize:'13px',padding:'8px 18px',opacity:(!newExEn.trim()||!newExAr.trim())?0.4:1}}>＋ إضافة المثال</button>
          </div>

          <div style={{borderTop:'2px solid #f1f5f9',paddingTop:'14px'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'10px',flexWrap:'wrap',gap:'8px'}}>
              <p style={{fontWeight:'bold',color:'#374151',margin:0,fontSize:'13px'}}>⭐ الأمثلة المرجعية الحالية ({examples.length})</p>
            </div>
            <div style={{display:'flex',flexWrap:'wrap',gap:'8px',marginBottom:'12px'}}>
              <button onClick={confirmSave} style={{...bp,fontSize:'12px',padding:'7px 14px',background:saveStatus==='success'?'#16a34a':saveStatus==='error'?'#dc2626':'#16a34a',border:'none'}}>
                {saveStatus==='saving'?'⏳ جاري...':saveStatus==='success'?'✅ تم الحفظ!':saveStatus==='error'?'❌ خطأ':'💾 احفظ'}
              </button>
              <button onClick={restoreDefaultExamples} style={{background:'#f1f5f9',border:'2px solid #e2e8f0',borderRadius:'10px',padding:'7px 14px',fontWeight:'600',cursor:'pointer',color:'#374151',fontSize:'12px',fontFamily:'inherit'}}>↺ استعادة الافتراضية</button>
              <button onClick={exportExamples} style={{background:'#eff6ff',border:'2px solid #bfdbfe',borderRadius:'10px',padding:'7px 14px',color:'#1d4ed8',fontWeight:'600',cursor:'pointer',fontSize:'12px',fontFamily:'inherit'}}>⬇️ تصدير نسخة احتياطية</button>
              <label style={{background:'#eff6ff',border:'2px solid #bfdbfe',borderRadius:'10px',padding:'7px 14px',color:'#1d4ed8',fontWeight:'600',cursor:'pointer',fontSize:'12px'}}>⬆️ استيراد ملف<input type="file" accept=".json" onChange={importExamplesFile} style={{display:'none'}}/></label>
            </div>
            {debugInfo&&<p style={{fontSize:'11px',color:'#94a3b8',background:'#f8fafc',borderRadius:'8px',padding:'6px 10px',fontFamily:'monospace',marginBottom:'10px'}}>{debugInfo}</p>}
            {examples.length===0?<p style={{fontSize:'13px',color:'#94a3b8'}}>لا توجد أمثلة. الترجمات التي تعتمدها كـ "صحيحة 100%" تُضاف هنا تلقائيًا.</p>
             :<div style={{maxHeight:'500px',overflowY:'auto',display:'flex',flexDirection:'column',gap:'8px'}}>
                {examples.map((ex,idx)=>(
                  <div key={idx} style={{border:'2px solid #f1f5f9',borderRadius:'14px',padding:'10px',background:'rgba(255,255,255,0.7)',display:'flex',gap:'10px',alignItems:'flex-start'}}>
                    <div style={{flex:1,display:'flex',flexDirection:'column',gap:'5px'}}>
                      {ex.ts&&<span style={{fontSize:'10px',color:'#94a3b8',direction:'ltr',textAlign:'left'}}>{new Date(ex.ts).toLocaleDateString('ar-IQ',{year:'numeric',month:'short',day:'numeric'})}</span>}
                      <textarea className="ltr-content" style={{width:'100%',border:'1px solid #e2e8f0',borderRadius:'8px',padding:'6px',fontSize:'12px',color:'#374151',background:'#f8fafc',resize:'none',boxSizing:'border-box'}} value={ex.en} onChange={e=>updateExample(idx,'en',e.target.value)} rows={Math.min(3,Math.max(1,Math.ceil((ex.en||"").length/65)))}/>
                      <textarea className="rtl-content" dir="rtl" style={{width:'100%',border:'1px solid #e0e7ff',borderRadius:'8px',padding:'6px',fontSize:'14px',color:'#1e293b',background:'#f5f3ff',fontWeight:'500',resize:'none',boxSizing:'border-box'}} value={ex.ar} onChange={e=>updateExample(idx,'ar',e.target.value)} rows={Math.min(3,Math.max(1,Math.ceil((ex.ar||"").length/65)))}/>
                    </div>
                    <button onClick={()=>removeExample(idx)} style={{background:'none',border:'none',cursor:'pointer',color:'#f87171',fontSize:'16px',padding:'4px'}}>✕</button>
                  </div>
                ))}
              </div>}
          </div>
        </div>
      )}

      {/* === السجل === */}
      {tab==='history'&&(
        <div style={{...cs,padding:'20px'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'10px'}}>
            <p style={{fontWeight:'bold',color:'#374151',margin:0,fontSize:'13px'}}>🗂️ سجل الترجمات ({history.length})</p>
            {history.length>0&&<button onClick={()=>{const blob=new Blob([JSON.stringify(history,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`history-${history.length}.json`;a.click();}} style={{background:'#eff6ff',border:'2px solid #bfdbfe',borderRadius:'10px',padding:'7px 14px',color:'#1d4ed8',fontWeight:'600',cursor:'pointer',fontSize:'12px',fontFamily:'inherit'}}>⬇️ تصدير السجل</button>}
          </div>
          {history.length===0?<p style={{fontSize:'13px',color:'#94a3b8'}}>لا توجد ترجمات مسجلة بعد.</p>
           :<div style={{maxHeight:'600px',overflowY:'auto',display:'flex',flexDirection:'column',gap:'8px'}}>
              {history.map((item,idx)=>(
                <div key={idx} style={{border:'2px solid #f1f5f9',borderRadius:'14px',padding:'12px',background:'rgba(255,255,255,0.7)'}}>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:'6px',flexWrap:'wrap',gap:'6px'}}>
                    <span style={{borderRadius:'99px',padding:'3px 10px',fontSize:'11px',fontWeight:'700',
                      ...(item.status==='perfect'?{background:'#dcfce7',color:'#16a34a'}:{background:'#fef3c7',color:'#b45309'})}}>
                      {item.status==='perfect'?'✅ صحيحة 100%':'✏️ تحتاج تعديل'}
                    </span>
                    <div style={{display:'flex',gap:'10px',alignItems:'center'}}>
                      {item.ts&&<span style={{fontSize:'10px',color:'#94a3b8'}}>{new Date(item.ts).toLocaleDateString('ar-IQ')}</span>}
                      <button onClick={()=>reuseFromHistory(item)} style={{background:'none',border:'none',color:'#4f46e5',fontSize:'12px',fontWeight:'600',cursor:'pointer',fontFamily:'inherit'}}>إعادة فتح</button>
                      <button onClick={()=>removeHistory(idx)} style={{background:'none',border:'none',color:'#f87171',fontSize:'12px',cursor:'pointer',fontFamily:'inherit'}}>حذف</button>
                    </div>
                  </div>
                  <p className="ltr-content" style={{fontSize:'12px',color:'#64748b',margin:'0 0 4px'}}>{item.en}</p>
                  <p className="rtl-content" dir="rtl" style={{fontSize:'15px',color:'#1e293b',fontWeight:'600',margin:0}}>{item.ar}</p>
                  {item.notes&&<p className="rtl-content" dir="rtl" style={{fontSize:'12px',color:'#b45309',background:'#fef3c7',borderRadius:'8px',padding:'6px 8px',margin:'6px 0 0'}}>ملاحظات: {item.notes}</p>}
                </div>
              ))}
            </div>}
        </div>
      )}
    </div>
  );
}
ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
